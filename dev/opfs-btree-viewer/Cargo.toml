[package]
name = "opfs-btree-viewer"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
base64 = "0.22"
opfs-btree = { path = "../../crates/opfs-btree" }
serde_json = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
  "Clipboard",
  "DataTransfer",
  "DragEvent",
  "Event",
  "File",
  "FileList",
  "HtmlElement",
  "HtmlInputElement",
  "InputEvent",
  "Navigator",
  "Window",
] }
yew = { version = "0.21", features = ["csr"] }
