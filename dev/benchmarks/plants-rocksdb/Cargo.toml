[package]
name = "plants-rocksdb-bench"
version = "0.0.0"
edition = "2024"
publish = false
description = "RocksDB-focused benchmark on the USDA plants dataset: sync time, space amplification, and by-id point lookups across raw RocksDB, a local Jazz client, and a Jazz client synced to a real Jazz server over a websocket."

[[bin]]
name = "plants-rocksdb-bench"
path = "src/main.rs"

[dependencies]
# The public Jazz client + server (real websocket sync), RocksDB-backed. The
# `test-utils` feature exposes `JazzServer`; `rocksdb` selects RocksDB storage.
jazz-tools = { path = "../../../crates/jazz-tools", features = [
  "test-utils",
  "rocksdb",
] }

# Raw RocksDB, driven directly with no Jazz seam (the `raw` baseline). Version +
# features match crates/groove/Cargo.toml so every layer uses the same engine.
rocksdb = { package = "rust-rocksdb", version = "0.48.0", default-features = false, features = [
  "lz4",
  "zstd",
] }

# Publishing allow-all permissions to the server's admin HTTP endpoint.
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
] }
serde_json = "1"

tokio = { version = "1", features = ["rt", "macros", "time"] }
uuid = "1.18.1"
tempfile = "3"
