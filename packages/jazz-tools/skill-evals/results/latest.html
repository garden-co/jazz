<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jazz skill evaluations</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        --page: light-dark(#f6f4ef, #111418);
        --panel: light-dark(#ffffff, #191d23);
        --panel-alt: light-dark(#efede7, #22272f);
        --ink: light-dark(#1b1d1f, #f2f0ea);
        --muted: light-dark(#666961, #aeb5be);
        --line: light-dark(#d8d4ca, #343a44);
        --accent: light-dark(#0a7358, #65d6ac);
        --accent-soft: light-dark(#d9f0e7, #173d33);
        --warn: light-dark(#a55710, #ffb35c);
        --danger: light-dark(#ae3f3f, #ff8b8b);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
      }
      button,
      input {
        font: inherit;
      }
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 72px;
      }
      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }
      .eyebrow {
        color: var(--accent);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 8px 0 5px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 0.98;
        letter-spacing: -0.045em;
      }
      h2 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
      }
      .meta {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .upload {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
        white-space: nowrap;
      }
      .upload:hover {
        border-color: var(--accent);
      }
      .upload input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: 0 12px 30px light-dark(#24200f0a, #00000020);
      }
      .metric {
        padding: 20px;
        min-height: 164px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .metric-label {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 750;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      .metric-value {
        margin-top: 18px;
        font-size: clamp(2.35rem, 6vw, 4rem);
        line-height: 1;
        font-weight: 760;
        letter-spacing: -0.06em;
      }
      .metric-detail {
        color: var(--muted);
        font-size: 0.86rem;
      }
      .accent {
        color: var(--accent);
      }
      section {
        margin-top: 28px;
      }
      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin: 0 2px 12px;
      }
      .comparison {
        display: grid;
        grid-template-columns: minmax(120px, 0.42fr) 1fr;
        gap: 20px;
        padding: 22px;
      }
      .uplift {
        align-self: center;
      }
      .uplift strong {
        display: block;
        color: var(--accent);
        font-size: 2.5rem;
        letter-spacing: -0.05em;
      }
      .bar-row {
        display: grid;
        grid-template-columns: 74px 1fr 58px;
        align-items: center;
        gap: 12px;
        margin: 10px 0;
        font-size: 0.88rem;
      }
      .bar {
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--panel-alt);
      }
      .bar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--muted);
      }
      .bar.loaded > span {
        background: var(--accent);
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      th,
      td {
        padding: 13px 16px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      .status {
        font-weight: 800;
      }
      .status.pass {
        color: var(--accent);
      }
      .status.fail {
        color: var(--danger);
      }
      .pill {
        display: inline-block;
        margin: 0 5px 4px 0;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 720;
      }
      .pill.none {
        background: var(--panel-alt);
        color: var(--muted);
      }
      details {
        border: 1px solid var(--line);
        border-radius: 13px;
        background: var(--panel);
        overflow: hidden;
      }
      details + details {
        margin-top: 10px;
      }
      summary {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 16px;
        align-items: center;
        padding: 16px 18px;
        cursor: pointer;
        font-weight: 720;
      }
      summary::marker {
        color: var(--accent);
      }
      .score {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .details-body {
        padding: 0 18px 18px;
        border-top: 1px solid var(--line);
      }
      .prompt {
        padding: 14px 0;
        color: var(--muted);
      }
      .rubric {
        display: grid;
        grid-template-columns: 1fr 76px 76px;
        gap: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        font-size: 0.84rem;
      }
      .rubric > div {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }
      .rubric > div:nth-last-child(-n + 3) {
        border-bottom: 0;
      }
      .rubric .head {
        color: var(--muted);
        background: var(--panel-alt);
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .response-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 12px;
      }
      .response {
        min-width: 0;
        padding: 13px;
        border-radius: 10px;
        background: var(--panel-alt);
      }
      .response b {
        display: block;
        margin-bottom: 8px;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .response pre {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: var(--muted);
        font:
          0.79rem/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      footer {
        margin-top: 30px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1120px);
          padding-top: 28px;
        }
        header {
          align-items: flex-start;
          flex-direction: column;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .comparison,
        .response-grid {
          grid-template-columns: 1fr;
        }
        summary {
          grid-template-columns: 1fr auto;
        }
        summary .score:first-of-type {
          display: none;
        }
        .rubric {
          grid-template-columns: 1fr 58px 58px;
        }
        table,
        tbody,
        tr,
        td {
          display: block;
          width: 100%;
        }
        thead {
          display: none;
        }
        tr {
          padding: 10px 12px;
          border-bottom: 1px solid var(--line);
        }
        tr:last-child {
          border-bottom: 0;
        }
        td,
        tr:last-child td {
          padding: 5px 0;
          border-bottom: 0;
        }
        td::before {
          content: attr(data-label);
          display: block;
          margin-bottom: 3px;
          color: var(--muted);
          font-size: 0.64rem;
          font-weight: 800;
          letter-spacing: 0.07em;
          text-transform: uppercase;
        }
      }

      @media print {
        :root {
          color-scheme: light;
        }
        main {
          width: 100%;
          padding: 0;
        }
        .upload {
          display: none;
        }
        .card,
        details {
          break-inside: avoid;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <div class="eyebrow">Jazz tools</div>
          <h1>Skill evaluations</h1>
          <p class="meta" id="meta"></p>
        </div>
        <label class="upload"
          >Update scores <input id="report-file" type="file" accept="application/json,.json"
        /></label>
      </header>

      <div class="grid" id="summary"></div>

      <section>
        <div class="section-head">
          <h2>Behavior quality</h2>

        </div>
        <div class="card comparison" id="comparison"></div>
      </section>

        <div class="section-head">
          <h2>Routing</h2>
          <span class="meta" id="routing-meta"></span>
        </div>
        <div class="card table-wrap">
          <table>
            <thead>
              <tr>
                <th>Case</th>
                <th>Expected</th>
                <th>Selected</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody id="routing"></tbody>
          </table>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>Behavior cases</h2>
          <span class="meta">baseline versus loaded skill</span>
        </div>
        <div id="behavior"></div>
      </section>

      <footer>
        Load a new JSON report with “Update scores” to refresh this page locally. Use the renderer
        script to save a shareable snapshot.
      </footer>
    </main>

              "rationale": "Correctly distinguishes optimistic batch visibility from authority-accepted transaction visibility and awaits only the outer result.",
              "response": "Use db.batch for the optimistic writes and db.transaction for authority-dependent writes. Await the returned batch or transaction result rather than individual writes inside its callback."
            },
            {
              "id": "behavior-permission-defaults",
              "prompt": "Explain what changes when an app publishes its first permissions bundle and how later permissions affect historical rows.",
              "expectedSkills": ["jazz-schema-evolution"],
              "selectedSkills": ["jazz-schema-evolution"],
              "selectionPassed": true,
              "rubric": [
                "States that before the first bundle all actors are allowed by the row-policy layer.",
                "States that after the first bundle operations without grants are denied.",
                "States that current permissions govern historical rows."
              ],
              "rubricScores": [1, 1, 1],
              "rationale": "Explicitly states permissive pre-bundle behavior, deny-by-missing-grant enforcement, and current-policy treatment of historical rows.",
              "response": "Before any permissions bundle, all actors may read and write. Publishing the first bundle means missing grants deny operations. Later bundles apply to historical rows too."
            },
            {
              "id": "behavior-permission-composition",
              "prompt": "Explain whether allowInsert.never() overrides another insert grant and whether source order matters.",
              "expectedSkills": ["jazz-schema-evolution"],
              "selectedSkills": ["jazz-schema-evolution"],
              "selectionPassed": true,
              "rubric": [
                "States that grants for the same operation are OR-combined.",
                "States that never() does not override another grant.",
                "States that source order does not matter."
              ],
              "rubricScores": [1, 1, 1],
              "rationale": "Explicitly states OR composition, that never() does not override another grant, and that source order is irrelevant.",
              "response": "allowInsert.never() contributes no grant and does not override another grant. Grants are OR-combined and source order does not matter."
            },
            {
              "id": "behavior-migration-generation",
              "prompt": "Generate a named migration and explain what the name and generated from/to schema witnesses represent.",
              "expectedSkills": ["jazz-schema-evolution"],
              "selectedSkills": ["jazz-schema-evolution"],
              "selectionPassed": true,
              "rubric": [
                "Uses migrations create --name with a descriptive label.",
                "Explains that the name affects the filename rather than migration metadata.",
                "Keeps generated minimal from/to witness objects instead of importing the mutable current schema."
              ],
              "rubricScores": [1, 1, 1],
              "rationale": "Uses the named command, identifies the label as filename-only, and retains generated minimal witnesses.",
              "response": "Run pnpm exec jazz-tools migrations create --name add-projects. The name is a filename label, not migration metadata. Keep the generated minimal from/to witnesses rather than importing the mutable current schema."
            },
            {
              "id": "behavior-deterministic-sync-test",
              "prompt": "Sketch a stable black-box test for two clients syncing several rows whose order is not itself under test.",
              "expectedSkills": ["jazz-testing"],
              "selectedSkills": ["jazz-testing"],
              "selectionPassed": true,
              "rubric": [
                "Waits for edge or global durability before asserting peer or server visibility.",
                "Uses a retrying assertion for eventual delivery instead of a fixed sleep.",
                "Orders the query explicitly or normalizes rows by a stable key.",
                "Shuts down clients, server, and subscriptions."
              ],
              "rubricScores": [1, 1, 1, 1],
              "rationale": "Awaits edge durability, retries with vi.waitFor, sorts by a stable key, and cleans up every created resource.",
              "response": "Use two real in-memory clients. Await edge durability, use vi.waitFor around Bob's query, sort rows by a stable key before comparing, and shut down both clients and the server in finally."
            },
            {
              "id": "behavior-denied-read-write",
              "prompt": "Test a policy that denies Bob access to Alice's row, covering both reads and writes.",
              "expectedSkills": ["jazz-testing"],
              "selectedSkills": ["jazz-testing"],
              "selectionPassed": true,
              "rubric": [
                "Asserts a denied read as an absent or filtered row rather than an exception.",
                "Asserts the denied write as rejected or expectDenied.",
                "Uses separate actor sessions through public testing APIs."
              ],
              "rubricScores": [1, 1, 1],
              "rationale": "Checks denied reads as an empty result, denied writes with expectDenied, and separate Alice and Bob sessions.",
              "response": "Use createPolicyTestApp with Alice and Bob sessions. Assert Bob's read resolves to [], use bob.expectDenied for update and delete, and re-read as Alice to prove the row was unchanged."
            }
          ]
        }
      }
    </script>
    <script>
      const escapeHtml = (value) =>
        String(value ?? "").replace(
          /[&<>"']/g,
          (character) =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[character],
        );
      const ratio = (score) => (score.total ? Math.round((score.passed / score.total) * 100) : 0);
      const scoreText = (score) => `${score.passed}/${score.total}`;
      const pills = (skills) =>
        skills?.length
          ? skills.map((skill) => `<span class="pill">${escapeHtml(skill)}</span>`).join("")
          : '<span class="pill none">none</span>';
      const resultMark = (passed) =>
        `<span class="status ${passed ? "pass" : "fail"}">${passed ? "Pass" : "Miss"}</span>`;

      function render(report) {
        const generated = report.generatedAt
          ? new Date(report.generatedAt).toLocaleString()
          : "template preview";
        document.querySelector("#meta").textContent =
          `${generated} · ${report.runner ?? "unknown runner"}`;
        const summary = report.summary;
        document.querySelector("#summary").innerHTML = [
          [
            "Routing accuracy",
            scoreText(summary.routing),
            `${ratio(summary.routing)}% exact skill selection`,
            "",
          ],
          [
            "Baseline quality",
            scoreText(summary.baseline.rubric),
            `${ratio(summary.baseline.rubric)}% of rubric criteria`,
            "",
          ],
          [
            "Loaded quality",
            scoreText(summary.loaded.rubric),
            `${ratio(summary.loaded.rubric)}% of rubric criteria`,
            "accent",
          ],
        ]
          .map(
            ([label, value, detail, className]) =>
              `<article class="card metric"><div><div class="metric-label">${label}</div><div class="metric-value ${className}">${value}</div></div><div class="metric-detail">${detail}</div></article>`,
          )
          .join("");

        const baselinePercent = ratio(summary.baseline.rubric);
        const loadedPercent = ratio(summary.loaded.rubric);
        const uplift = summary.rubricUplift;
        document.querySelector("#comparison").innerHTML =
          `<div class="uplift"><span class="metric-label">Rubric uplift</span><strong>${uplift >= 0 ? "+" : ""}${uplift}</strong><span class="meta">criteria after loading skills</span></div><div><div class="bar-row"><span>Baseline</span><div class="bar"><span style="width:${baselinePercent}%"></span></div><b>${baselinePercent}%</b></div><div class="bar-row"><span>Loaded</span><div class="bar loaded"><span style="width:${loadedPercent}%"></span></div><b>${loadedPercent}%</b></div></div>`;

        document.querySelector("#routing-meta").textContent =
          `${scoreText(summary.routing)} exact matches`;
        document.querySelector("#routing").innerHTML = report.routing
          .map(
            (item) =>
              `<tr><td data-label="Case"><b>${escapeHtml(item.id)}</b><br><span class="meta">${escapeHtml(item.prompt)}</span></td><td data-label="Expected">${pills(item.expectedSkills)}</td><td data-label="Selected">${pills(item.selectedSkills)}</td><td data-label="Result">${resultMark(item.passed)}</td></tr>`,
          )
          .join("");

        const loadedById = new Map(report.behavior.loaded.map((item) => [item.id, item]));
        document.querySelector("#behavior").innerHTML = report.behavior.baseline
          .map((baseline) => {
            const loaded = loadedById.get(baseline.id);
            const baselinePassed = baseline.rubricScores.reduce((sum, value) => sum + value, 0);
            const loadedPassed = loaded.rubricScores.reduce((sum, value) => sum + value, 0);
            const rubricRows = baseline.rubric
              .map(
                (criterion, index) =>
                  `<div>${escapeHtml(criterion)}</div><div>${resultMark(Boolean(baseline.rubricScores[index]))}</div><div>${resultMark(Boolean(loaded.rubricScores[index]))}</div>`,
              )
              .join("");
            return `<details><summary><span>${escapeHtml(baseline.id)}</span><span class="score">baseline ${baselinePassed}/${baseline.rubric.length}</span><span class="score accent">loaded ${loadedPassed}/${baseline.rubric.length}</span></summary><div class="details-body"><p class="prompt">${escapeHtml(baseline.prompt)}</p><div class="rubric"><div class="head">Criterion</div><div class="head">Base</div><div class="head">Loaded</div>${rubricRows}</div><div class="response-grid"><div class="response"><b>Baseline response</b><pre>${escapeHtml(baseline.response)}</pre></div><div class="response"><b>Skill-loaded response</b><pre>${escapeHtml(loaded.response)}</pre></div></div></div></details>`;
          })
          .join("");
      }

      const embeddedReport = JSON.parse(document.querySelector("#eval-report").textContent);
      render(embeddedReport);
      document.querySelector("#report-file").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        try {
          render(JSON.parse(await file.text()));
        } catch (error) {
          window.alert(`Could not load report: ${error.message}`);
        }
      });
    </script>
  </body>
</html>
