[package]
name = "jazz"
version = "0.1.0"
edition = "2024"

[features]
default = ["rocksdb"]
rocksdb = ["groove/rocksdb"]
testing = []

[dependencies]
futures-core = "0.3.31"
futures-channel = "0.3.31"
groove = { workspace = true, default-features = false }
postcard = { version = "1.1.3", features = ["alloc"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
uuid = { version = "1.18.1", features = ["serde", "v5", "v7"] }

[dev-dependencies]
hdrhistogram = "7.5.4"
tempfile = "3.27.0"

[[bench]]
name = "validation"
harness = false

[[bench]]
name = "sync"
harness = false

[[bench]]
name = "cold_subscription"
harness = false

[[bench]]
name = "large_value_checkpointing"
harness = false

[[bench]]
name = "merge_back_cost"
harness = false
