<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jazz WASM Direct ABI Browser Example</title>
  </head>
  <body>
    <main id="app" class="shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">jazz-wasm direct ABI</p>
          <h1>Todo smoke</h1>
        </div>
        <p id="summary" class="summary">Starting...</p>
      </header>

      <section class="facts" aria-label="Runtime facts">
        <div class="fact">
          <span>Runtime</span>
          <strong id="runtimeStatus">Booting</strong>
        </div>
        <div class="fact">
          <span>Durability</span>
          <strong id="durabilityStatus">Pending</strong>
        </div>
        <div class="fact">
          <span>Read</span>
          <strong id="readStatus">Waiting</strong>
        </div>
        <div class="fact">
          <span>Watch</span>
          <strong id="watchStatus">Waiting</strong>
        </div>
      </section>

      <section class="panel" aria-labelledby="todosTitle">
        <div class="panel-header">
          <h2 id="todosTitle">Current todos</h2>
          <span id="rowCount">0 todos</span>
        </div>
        <div class="todo-list" role="table" aria-label="Current todos">
          <div class="todo-row todo-head" role="row">
            <span role="columnheader">Title</span>
            <span role="columnheader">State</span>
            <span role="columnheader">Row ID</span>
          </div>
          <div id="todosBody"></div>
        </div>
      </section>

      <section class="panel transitions" aria-labelledby="transitionsTitle">
        <div class="panel-header">
          <h2 id="transitionsTitle">Watch transitions</h2>
        </div>
        <div id="transitionsBody" aria-live="polite"></div>
      </section>

      <pre id="log" aria-live="polite"></pre>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
