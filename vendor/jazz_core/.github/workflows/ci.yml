name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy -p groove --all-targets --benches -- -D warnings
      - name: Test
        run: cargo test -p groove
      - name: Test jazz
        run: cargo test -p jazz
      - name: Test jazz-server
        run: cargo test -p jazz-server
      - name: JS ABI fixture decoder
        run: node jazz/fixtures/js/decode_abi_fixtures.js
      - name: Compile benchmarks
        run: cargo check -p groove --benches
      - name: Jazz scenario smoke
        run: cargo test -p jazz-sim --test scenario_smoke
      - name: Smoke scenario benchmark - social feed
        run: GROOVE_SCENARIO=social_feed GROOVE_ENGINE=groove GROOVE_USERS=40 GROOVE_SUBSCRIPTIONS=8 GROOVE_INITIAL_FOLLOWS=40 GROOVE_COMMITS=12 cargo bench -p groove --bench scenario --quiet
      - name: Smoke scenario benchmark - parameterized social feed
        run: GROOVE_SCENARIO=social_feed GROOVE_ENGINE=groove_prepared GROOVE_USERS=40 GROOVE_SUBSCRIPTIONS=8 GROOVE_INITIAL_FOLLOWS=40 GROOVE_COMMITS=12 cargo bench -p groove --bench scenario --quiet
      - name: Smoke scenario benchmark - ACL
        run: GROOVE_SCENARIO=acl GROOVE_ENGINE=groove GROOVE_PRINCIPALS=30 GROOVE_GROUPS=8 GROOVE_RESOURCES=20 GROOVE_SUBSCRIPTIONS=6 GROOVE_INITIAL_MEMBERSHIPS=40 GROOVE_INITIAL_GRANTS=25 GROOVE_COMMITS=12 GROOVE_ACL_SERIES=delete cargo bench -p groove --bench scenario --quiet
      - name: Smoke scenario benchmark - parameterized ACL
        run: GROOVE_SCENARIO=acl GROOVE_ENGINE=groove_prepared GROOVE_PRINCIPALS=30 GROOVE_GROUPS=8 GROOVE_RESOURCES=20 GROOVE_SUBSCRIPTIONS=6 GROOVE_INITIAL_MEMBERSHIPS=40 GROOVE_INITIAL_GRANTS=25 GROOVE_COMMITS=12 GROOVE_ACL_SERIES=delete cargo bench -p groove --bench scenario --quiet
      - name: Smoke scenario benchmark - oneshot
        run: GROOVE_SCENARIO=oneshot GROOVE_ENGINE=groove_query GROOVE_ROWS=100 GROOVE_AUTHORS=10 GROOVE_QUERIES=20 cargo bench -p groove --bench scenario --quiet
