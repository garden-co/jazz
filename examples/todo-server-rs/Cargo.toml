[package]
name = "todo-server"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "todo-server"
path = "src/main.rs"

[dependencies]
jazz-rs = { path = "../../crates/jazz-rs" }
groove = { package = "jazz-core", path = "../../crates/groove", version = "2.0.0-alpha.0" }

tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"

[dev-dependencies]
tempfile = "3"
reqwest = { version = "0.12", features = ["json"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
futures-util = "0.3"
reqwest-eventsource = "0.6"
jsonwebtoken = "9"
