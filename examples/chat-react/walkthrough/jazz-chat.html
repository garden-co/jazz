<h1 id="how-chat-uses-jazz">How Chat uses Jazz</h1>
<p>A walkthrough of a real-time chat app with row-level permissions, built with Jazz and React.</p>
<p>Public rooms, private chats, invite links, emoji reactions, file uploads, collaborative canvases.</p>
</section>

<h2 id="what-is-jazz">What is Jazz?</h2>
<p>Jazz is a <strong>local-first</strong> sync framework. Every client runs a full database in a WASM worker, persisted in the browser's private filesystem. Changes sync to a server and reach all connected clients in real time.</p>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 212" width="520" height="196" style="display:block;margin:0.5rem auto">

  <text x="280" y="54" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#166534">sync + fan-out + policy enforcement</text>
  <rect x="8" y="130" width="170" height="74" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />

</svg>
<p>Writes are <strong>instant locally</strong>. Row-level <strong>policies</strong> are enforced on the server, so only authorised data reaches each client.</p>
</section>

<h2 id="client-setup">Client setup</h2>
<p><code>JazzProvider</code> wraps your app. Pass it a config and <code>createJazzClient</code> — Jazz takes care of the WASM worker, the local database, and the sync connection.</p>
<p><strong><a href="../src/App.tsx"><code>src/App.tsx</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">import</span> { createJazzClient, <span class="hljs-title class_">JazzProvider</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;jazz-tools/react&quot;</span>;

<span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">return</span> (
    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">JazzProvider</span> <span class="hljs-attr">config</span>=<span class="hljs-string">{defaultConfig()}</span> <span class="hljs-attr">createJazzClient</span>=<span class="hljs-string">{createJazzClient}</span>
                  <span class="hljs-attr">fallback</span>=<span class="hljs-string">{</span>&lt;<span class="hljs-attr">p</span>&gt;</span>Loading...<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>}&gt;
      <span class="hljs-tag">&lt;<span class="hljs-name">AppContent</span> /&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">JazzProvider</span>&gt;</span></span>
  );
}
</code></pre>
<p>That's the entire setup.</p>

<h2 id="accessing-the-db-anywhere">Accessing the db anywhere</h2>
<p><code>useDb()</code> and <code>useSession()</code> are available to any component inside <code>JazzProvider</code>.</p>
<pre><code class="language-typescript"><span class="hljs-keyword">import</span> { useDb, useSession, useAll } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;jazz-tools/react&quot;</span>;

<span class="hljs-keyword">const</span> db = <span class="hljs-title function_">useDb</span>(); <span class="hljs-comment">// full query + write API</span>
<span class="hljs-keyword">const</span> session = <span class="hljs-title function_">useSession</span>(); <span class="hljs-comment">// { user_id, ... } | null</span>
<span class="hljs-keyword">const</span> userId = session?.<span class="hljs-property">user_id</span>;
</code></pre>
<p><code>ChatList</code>, <code>ChatView</code>, <code>MessageComposer</code>, <code>ActionMenu</code>, <code>ChatReactions</code> — each calls <code>useDb()</code> directly, no wiring needed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="6" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/03-message-sent.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="6" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="6" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="live-queries-with-useall">Live queries with <code>useAll</code></h2>

<p><code>useAll</code> subscribes to a query against the local database. When data changes — including changes from other users — the component re-renders.</p>
<p><strong><a href="../src/components/chat-view/ChatView.tsx"><code>src/components/chat-view/ChatView.tsx</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">const</span> messages =
  <span class="hljs-title function_">useAll</span>(
    app.<span class="hljs-property">messages</span>
      .<span class="hljs-title function_">where</span>({ chatId })
      .<span class="hljs-title function_">include</span>({ <span class="hljs-attr">sender</span>: <span class="hljs-literal">true</span> })
      .<span class="hljs-title function_">orderBy</span>(<span class="hljs-string">&quot;createdAt&quot;</span>, <span class="hljs-string">&quot;desc&quot;</span>)
      .<span class="hljs-title function_">limit</span>(<span class="hljs-number">20</span>),
  ) ?? [];
</code></pre>
<p>When a remote user sends a message, it appears instantly.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="6" style="" data-marpit-pagination-total="15" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="7" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/02-composing.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="7" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="7" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="synchronous-writes">Synchronous writes</h2>

<p>Writes return immediately. The local database is the source of truth; the server catches up in the background.</p>
<p><strong><a href="../src/components/composer/MessageComposer.tsx"><code>src/components/composer/MessageComposer.tsx</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">const</span> <span class="hljs-title function_">handleSend</span> = (<span class="hljs-params"><span class="hljs-attr">html</span>: <span class="hljs-built_in">string</span></span>) =&gt; {
  db.<span class="hljs-title function_">insert</span>(app.<span class="hljs-property">messages</span>, {
    chatId,
    <span class="hljs-attr">text</span>: html.<span class="hljs-title function_">trim</span>(),
    <span class="hljs-attr">senderId</span>: myProfile.<span class="hljs-property">id</span>,
    <span class="hljs-attr">createdAt</span>: <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(),
  });
};
</code></pre>
<p>No loading spinners, no optimistic UI layer. The insert is the UI update.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="7" style="" data-marpit-pagination-total="15" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="8" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;" data-marpit-pagination-total="15">
<h2 id="permissions--the-policy-dsl">Permissions — the policy DSL</h2>
<p>Policies live in <strong><a href="../schema/permissions.ts"><code>schema/permissions.ts</code></a></strong>, written in a typed DSL. They're compiled into the schema and enforced on the server on every sync.</p>
<pre><code class="language-typescript"><span class="hljs-comment">// Messages: only chat members can read or send</span>
policy.<span class="hljs-property">messages</span>.<span class="hljs-property">allowRead</span>.<span class="hljs-title function_">where</span>(<span class="hljs-function">(<span class="hljs-params">msg</span>) =&gt;</span>
  <span class="hljs-title function_">anyOf</span>([
    allowedTo.<span class="hljs-title function_">read</span>(<span class="hljs-string">&quot;chatId&quot;</span>), <span class="hljs-comment">// inherits from parent: public chats are readable</span>
    policy.<span class="hljs-property">chatMembers</span>.<span class="hljs-property">exists</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">chatId</span>: msg.<span class="hljs-property">chatId</span>, <span class="hljs-attr">userId</span>: session.<span class="hljs-property">user_id</span> }),
  ]),
);
policy.<span class="hljs-property">messages</span>.<span class="hljs-property">allowInsert</span>.<span class="hljs-title function_">where</span>(<span class="hljs-function">(<span class="hljs-params">msg</span>) =&gt;</span>
  policy.<span class="hljs-property">chatMembers</span>.<span class="hljs-property">exists</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">chatId</span>: msg.<span class="hljs-property">chatId</span>, <span class="hljs-attr">userId</span>: session.<span class="hljs-property">user_id</span> }),
);
policy.<span class="hljs-property">messages</span>.<span class="hljs-property">allowDelete</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">senderId</span>: session.<span class="hljs-property">user_id</span> });
</code></pre>
<p>Row-level security is a schema concern. Components contain no auth logic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="9" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/08-chat-list.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="9" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="9" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="public-and-private-chats">Public and private chats</h2>

<p>The <code>chats</code> policy combines three conditions, with no backend code:</p>
<pre><code class="language-typescript">policy.<span class="hljs-property">chats</span>.<span class="hljs-property">allowRead</span>.<span class="hljs-title function_">where</span>(<span class="hljs-function">(<span class="hljs-params">chat</span>) =&gt;</span>
  <span class="hljs-title function_">anyOf</span>([
    { <span class="hljs-attr">isPublic</span>: <span class="hljs-literal">true</span> }, <span class="hljs-comment">// public rooms</span>
    policy.<span class="hljs-property">chatMembers</span>.<span class="hljs-property">exists</span>.<span class="hljs-title function_">where</span>({
      <span class="hljs-comment">// accepted members</span>
      <span class="hljs-attr">chatId</span>: chat.<span class="hljs-property">id</span>,
      <span class="hljs-attr">userId</span>: session.<span class="hljs-property">user_id</span>,
    }),
    { <span class="hljs-attr">joinCode</span>: session[<span class="hljs-string">&quot;claims.join_code&quot;</span>] }, <span class="hljs-comment">// invite link bearer</span>
  ]),
);
</code></pre>
<p>The third condition is how invites work: a client attaches a temporary credential to its subscription, and the server checks it against the chat's join code.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="9" style="" data-marpit-pagination-total="15" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="10" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;" data-marpit-pagination-total="15">
<h2 id="the-invite-flow">The invite flow</h2>
<p>Private chats carry a <code>joinCode</code>. Sharing <code>/#/invite/:chatId/:code</code> lets anyone join in two steps.</p>
<p><strong><a href="../src/components/InviteHandler.tsx"><code>src/components/InviteHandler.tsx</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-comment">// Step 1: subscribe with the join code as a temporary credential.</span>
<span class="hljs-comment">// The server matches it against the chat&#x27;s joinCode and syncs the row.</span>
db.<span class="hljs-title function_">subscribeAll</span>(
  app.<span class="hljs-property">chats</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">id</span>: chatId }),
  <span class="hljs-function">(<span class="hljs-params">delta</span>) =&gt;</span> {
    <span class="hljs-keyword">if</span> (delta.<span class="hljs-property">all</span>.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) <span class="hljs-title function_">setChatLoaded</span>(<span class="hljs-literal">true</span>);
  },
  <span class="hljs-literal">undefined</span>,
  { <span class="hljs-attr">user_id</span>: userId, <span class="hljs-attr">claims</span>: { <span class="hljs-attr">join_code</span>: code } },
);

<span class="hljs-comment">// Step 2: once the chat row is local, insert the membership and navigate.</span>
db.<span class="hljs-title function_">insert</span>(app.<span class="hljs-property">chatMembers</span>, { chatId, userId, <span class="hljs-attr">joinCode</span>: code });
<span class="hljs-title function_">navigate</span>(<span class="hljs-string">`/#/chat/<span class="hljs-subst">${chatId}</span>`</span>);
</code></pre>
<p>The credential is never stored. It exists only for this subscription.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="11" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;" data-marpit-pagination-total="15">
<h2 id="chat-header-and-settings">Chat header and settings</h2>
<p>The <code>ChatHeader</code> shows the chat name (or participant names and date) with a settings button. The <code>ChatSettings</code> sheet lets members rename the chat, view the member list, share an invite, or leave.</p>
<pre><code class="language-typescript"><span class="hljs-comment">// Display name: shows other members&#x27; names, or an explicit title if set</span>
<span class="hljs-keyword">const</span> displayName = <span class="hljs-title function_">useChatDisplayName</span>(chatId, chat?.<span class="hljs-property">name</span>);

<span class="hljs-comment">// Any member can rename the chat (clear the name to revert to participants)</span>
db.<span class="hljs-title function_">update</span>(app.<span class="hljs-property">chats</span>, chatId, { <span class="hljs-attr">name</span>: newName || <span class="hljs-literal">null</span> });

<span class="hljs-comment">// Leave: delete your own membership, navigate to the chat list</span>
db.<span class="hljs-title function_">delete</span>(app.<span class="hljs-property">chatMembers</span>, myMembership.<span class="hljs-property">id</span>);
<span class="hljs-title function_">navigate</span>(<span class="hljs-string">&quot;/#/chats&quot;</span>);
</code></pre>
<p>When a user opens a public chat they haven't joined yet, <code>ChatView</code> adds them as a member automatically.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="12" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/04-reaction-picker.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="12" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="12" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="reactions--live-policy-scoped">Reactions — live, policy-scoped</h2>

<p>Each reaction is a row. The query is live; toggling one is a synchronous insert or delete.</p>
<p><strong><a href="../src/components/chat/ChatReactions.tsx"><code>src/components/chat/ChatReactions.tsx</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">const</span> reactions = <span class="hljs-title function_">useAll</span>(app.<span class="hljs-property">reactions</span>.<span class="hljs-title function_">where</span>({ messageId })) ?? [];

<span class="hljs-keyword">const</span> <span class="hljs-title function_">handleToggle</span> = (<span class="hljs-params"><span class="hljs-attr">emoji</span>: <span class="hljs-built_in">string</span></span>) =&gt; {
  <span class="hljs-keyword">const</span> mine = reactions.<span class="hljs-title function_">find</span>(<span class="hljs-function">(<span class="hljs-params">r</span>) =&gt;</span> r.<span class="hljs-property">emoji</span> === emoji &amp;&amp; r.<span class="hljs-property">userId</span> === userId);
  <span class="hljs-keyword">if</span> (mine) {
    db.<span class="hljs-title function_">delete</span>(app.<span class="hljs-property">reactions</span>, mine.<span class="hljs-property">id</span>);
  } <span class="hljs-keyword">else</span> {
    db.<span class="hljs-title function_">insert</span>(app.<span class="hljs-property">reactions</span>, { messageId, userId, emoji });
  }
};
</code></pre>
<p><code>allowDelete</code> is scoped to <code>{ userId: session.user_id }</code> — you can only remove your own reactions. The policy handles it; the component doesn't check.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="12" style="" data-marpit-pagination-total="15" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="13" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;" data-marpit-pagination-total="15">
<h2 id="attachments--jazz-file-storage">Attachments — Jazz file storage</h2>
<p>Jazz splits files into chunks and handles reassembly. Uploads wait for server confirmation so the data is available to other users immediately.</p>
<pre><code class="language-typescript"><span class="hljs-comment">// Upload: store on the edge, wait for confirmation</span>
<span class="hljs-keyword">const</span> storedFile = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">createFileFromBlob</span>(app, attachment.<span class="hljs-property">file</span>, { <span class="hljs-attr">tier</span>: <span class="hljs-string">&quot;edge&quot;</span> });

db.<span class="hljs-title function_">insert</span>(app.<span class="hljs-property">attachments</span>, {
  <span class="hljs-attr">messageId</span>: message.<span class="hljs-property">id</span>,
  <span class="hljs-attr">type</span>: attachment.<span class="hljs-property">type</span>,
  <span class="hljs-attr">name</span>: attachment.<span class="hljs-property">file</span>.<span class="hljs-property">name</span>,
  <span class="hljs-attr">fileId</span>: storedFile.<span class="hljs-property">id</span>,
  <span class="hljs-attr">size</span>: attachment.<span class="hljs-property">file</span>.<span class="hljs-property">size</span>,
});

<span class="hljs-comment">// Download: fetch from the edge</span>
<span class="hljs-keyword">const</span> blob = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">loadFileAsBlob</span>(app, attachment.<span class="hljs-property">fileId</span>, { <span class="hljs-attr">tier</span>: <span class="hljs-string">&quot;edge&quot;</span> });
</code></pre>
<p>Attachments inherit their read policy from the parent message via <code>allowedTo.read(&quot;messageId&quot;)</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="14" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/06-canvas.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="14" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="14" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="15" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="collaborative-canvas">Collaborative canvas</h2>

<p>Each chat can host shared drawing canvases. Strokes are rows synced in real time.</p>
<pre><code class="language-typescript"><span class="hljs-comment">// Live — re-renders whenever any stroke is added or removed</span>
<span class="hljs-keyword">const</span> allStrokes = <span class="hljs-title function_">useAll</span>(app.<span class="hljs-property">strokes</span>.<span class="hljs-title function_">where</span>({ canvasId })) ?? [];

<span class="hljs-comment">// Clear your own strokes — policy enforces ownerId check server-side</span>
<span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> s <span class="hljs-keyword">of</span> allStrokes.<span class="hljs-title function_">filter</span>(<span class="hljs-function">(<span class="hljs-params">s</span>) =&gt;</span> s.<span class="hljs-property">ownerId</span> === userId)) {
  db.<span class="hljs-title function_">delete</span>(app.<span class="hljs-property">strokes</span>, s.<span class="hljs-property">id</span>);
}
</code></pre>
<p>Strokes inherit read access from their canvas, which inherits from the chat. The canvas component has no explicit access checks.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="14" style="" data-marpit-pagination-total="15" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags" lang="en-GB" data-marpit-pagination="15" style="--paginate:true;--theme:2n8umuwfbfix72hrs77valur924o19fjfk01n1zn3ags;" data-marpit-pagination-total="15">
<h2 id="jazz-api-surface--used-in-chat">Jazz API surface — used in Chat</h2>
<table>
<thead>
<tr>
<th>API</th>
<th>Notes</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>createJazzClient</code></td>
<td>Passed to JazzProvider — sets up the WASM worker and sync</td>
</tr>
<tr>
<td><code>JazzProvider</code></td>
<td>Makes the db available to all child components</td>
</tr>
<tr>
<td><code>useDb()</code></td>
<td>Returns the db handle for queries and writes</td>
</tr>
<tr>
<td><code>useSession()</code></td>
<td>Current user identity (<code>user_id</code>)</td>
</tr>
<tr>
<td><code>useAll(query)</code></td>
<td>Live query hook — re-renders on changes</td>
</tr>
<tr>
<td><code>db.insert</code> / <code>db.delete</code> / <code>db.update</code></td>
<td>Synchronous local writes, synced in the background</td>
</tr>
<tr>
<td><code>db.insertDurable</code></td>
<td>Async write — resolves when confirmed at the given tier</td>
