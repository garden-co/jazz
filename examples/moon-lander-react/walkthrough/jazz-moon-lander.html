<h1 id="how-moon-lander-uses-jazz">How Moon Lander uses Jazz</h1>
<p>A walkthrough of real-time multiplayer in a browser game, built with Jazz, React, and a canvas physics engine.</p>
<p>Players share a moon surface: they collect fuel deposits, trade fuel with each other, and see each other's landers moving in real time.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="hero" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" class="hero" data-marpit-pagination="1" style="" data-marpit-pagination-total="14" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="what-is-jazz">What is Jazz?</h2>
<p>Jazz is a <strong>local-first</strong> sync framework. Every client runs a full database in a WASM worker, persisted to disk via OPFS. Changes sync to an edge server and fan out to all connected clients in real time.</p>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 212" width="520" height="196" style="display:block;margin:0.5rem auto">
  <defs>

  <rect x="180" y="10" width="200" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" />
  <text x="280" y="34" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="700" fill="#166534">Jazz sync server</text>
  <text x="280" y="54" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#166534">sync + fan-out</text>
  <rect x="8" y="130" width="170" height="74" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="93" y="154" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="700" fill="#1e40af">Browser A</text>

  <text x="467" y="154" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="700" fill="#1e40af">Browser B</text>
  <text x="467" y="174" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1e3a8a">WASM worker</text>
  <text x="467" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1e3a8a">OPFS (local DB)</text>

</svg>
<ul>
<li>No REST API. No WebSockets to manage. No manual state reconciliation.</li>
<li>Writes are <strong>instant locally</strong>. Sync happens in the background.</li>
<li>Every client is always readable, even offline.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">

<h2 id="client-setup">Client setup</h2>
<p><code>JazzProvider</code> accepts a <code>config</code> object and handles the WASM worker, OPFS database, and sync connection internally. It makes <code>db</code> available to every component in the tree.</p>
<p><strong><a href="../src/App.tsx"><code>src/App.tsx</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">JazzProvider</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;jazz-tools/react&quot;</span>;

<span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params">{ config, playerId, physicsSpeed, initialMode, spawnX }: <span class="hljs-title class_">AppProps</span></span>) {
  <span class="hljs-keyword">if</span> (!config) {
    <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">Game</span> <span class="hljs-attr">physicsSpeed</span>=<span class="hljs-string">{physicsSpeed}</span> <span class="hljs-attr">initialMode</span>=<span class="hljs-string">{initialMode}</span> <span class="hljs-attr">spawnX</span>=<span class="hljs-string">{spawnX}</span> /&gt;</span></span>;
  }

  <span class="hljs-keyword">return</span> (
    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">JazzProvider</span> <span class="hljs-attr">config</span>=<span class="hljs-string">{config}</span>&gt;</span>
      <span class="hljs-tag">&lt;<span class="hljs-name">GameWithSync</span> <span class="hljs-attr">playerId</span>=<span class="hljs-string">{playerId</span> ?? <span class="hljs-attr">crypto.randomUUID</span>()} /&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">JazzProvider</span>&gt;</span></span>
  );
}
</code></pre>
<p>Without a config, <code>&lt;Game&gt;</code> mounts directly with no Jazz layer, useful for offline play and tests.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="where-jazz-lives-in-the-source-tree">Where Jazz lives in the source tree</h2>
<p>All Jazz integration is in one folder:</p>
<pre><code>src/jazz/
├── GameWithSync.tsx   ← bridge: Jazz data → Game props + write callbacks
├── useSync.ts         ← all Jazz reads (subscriptions to 3 tables)
└── SyncManager.ts     ← all Jazz writes (immediate fire-and-forget)
</code></pre>
<p><code>src/game/</code> and <code>src/Game.tsx</code> are pure game engine code. They receive data via props and callbacks and know nothing about Jazz.</p>
<p>This separation means you can read the entire Jazz integration by looking at three files, without touching any physics or rendering code.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="14" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/02-surface-deposits.png&quot;);background-size:88%;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="6" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="14" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="live-subscriptions-useall">Live subscriptions: <code>useAll</code></h2>

<p><strong><a href="../src/jazz/useSync.ts"><code>src/jazz/useSync.ts</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">import</span> { useAll, useDb } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;jazz-tools/react&quot;</span>;

<span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">useSync</span>(<span class="hljs-params"><span class="hljs-attr">playerId</span>: <span class="hljs-built_in">string</span></span>): <span class="hljs-title class_">SyncResult</span> {
  <span class="hljs-comment">// Other players&#x27; positions, modes, fuel levels - live from the server</span>
  <span class="hljs-keyword">const</span> remotePlayers = <span class="hljs-title function_">useAll</span>(
    app.<span class="hljs-property">players</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">playerId</span>: { <span class="hljs-attr">ne</span>: playerId } }),
  );

  <span class="hljs-comment">// Deposits on the surface - drives the game&#x27;s collectible objects</span>
  <span class="hljs-keyword">const</span> uncollectedDeposits = <span class="hljs-title function_">useAll</span>(
    app.<span class="hljs-property">fuel_deposits</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">collected</span>: <span class="hljs-literal">false</span> }),
  );

  <span class="hljs-comment">// Chat messages, newest-last</span>
  <span class="hljs-keyword">const</span> chatMessages = <span class="hljs-title function_">useAll</span>(
    app.<span class="hljs-property">chat_messages</span>.<span class="hljs-title function_">orderBy</span>(<span class="hljs-string">&quot;createdAt&quot;</span>, <span class="hljs-string">&quot;asc&quot;</span>),
  );
  ...
}
</code></pre>
<p>Results stream from the sync server. When any client writes, every subscriber re-renders automatically. No polling, no manual invalidation.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="6" style="" data-marpit-pagination-total="14" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="waiting-for-the-edge-the-settled-flag">Waiting for the edge: the <code>settled</code> flag</h2>
<p>The first <code>useAll</code> result may arrive before all remote data has synced. Moon Lander uses a <code>settled</code> flag to delay game setup until the edge subscription has delivered its initial payload.</p>
<pre><code class="language-typescript"><span class="hljs-comment">// &quot;edge&quot; tier: undefined = still connecting to server; [] or [...] = server has responded</span>
<span class="hljs-keyword">const</span> allUncollected = <span class="hljs-title function_">useAll</span>(app.<span class="hljs-property">fuel_deposits</span>.<span class="hljs-title function_">where</span>({ <span class="hljs-attr">collected</span>: <span class="hljs-literal">false</span> }), <span class="hljs-string">&quot;edge&quot;</span>);

<span class="hljs-keyword">const</span> settled = allUncollected !== <span class="hljs-literal">undefined</span>;
</code></pre>
<p><code>settled</code> gates two things:</p>
<ol>
<li><strong>Deposit reconciliation</strong>: ensuring the surface has the right number of deposits for the current player count (runs once, after settle).</li>
<li><strong>Player row insert</strong>: the local player is only written to the DB after settle, preventing duplicate rows from concurrent joins.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">

<h2 id="immediate-writes-the-syncmanager">Immediate writes: the SyncManager</h2>
<p>Game callbacks fire Jazz writes directly. <code>SyncManager</code> owns every write and uses a <code>releasingIds</code> guard to prevent double-releasing the same deposit across concurrent async operations.</p>
<p><strong><a href="../src/jazz/SyncManager.ts"><code>src/jazz/SyncManager.ts</code></a></strong></p>
<pre><code class="language-typescript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">SyncManager</span> {
  <span class="hljs-keyword">private</span> collectedByThis = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Map</span>&lt;<span class="hljs-built_in">string</span>, { <span class="hljs-attr">fuelType</span>: <span class="hljs-built_in">string</span>; <span class="hljs-attr">positionX</span>: <span class="hljs-built_in">number</span> }&gt;();
  <span class="hljs-keyword">private</span> releasingIds = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Set</span>&lt;<span class="hljs-built_in">string</span>&gt;();  <span class="hljs-comment">// guards against double-release</span>
  <span class="hljs-keyword">private</span> <span class="hljs-attr">dbRowId</span>: <span class="hljs-built_in">string</span> | <span class="hljs-literal">null</span> = <span class="hljs-literal">null</span>;

  <span class="hljs-title function_">constructor</span>(<span class="hljs-params"><span class="hljs-keyword">private</span> <span class="hljs-attr">db</span>: <span class="hljs-title class_">ReturnType</span>&lt;<span class="hljs-keyword">typeof</span> useDb&gt;, <span class="hljs-keyword">private</span> <span class="hljs-attr">playerId</span>: <span class="hljs-built_in">string</span></span>) {}

  <span class="hljs-title function_">collectDeposit</span>(<span class="hljs-params"><span class="hljs-attr">id</span>: <span class="hljs-built_in">string</span></span>) { <span class="hljs-comment">/* db.update immediately */</span> }
  <span class="hljs-title function_">refuel</span>(<span class="hljs-params"><span class="hljs-attr">fuelType</span>: <span class="hljs-title class_">FuelType</span></span>) { <span class="hljs-comment">/* releaseDeposit - delete + insert */</span> }
  <span class="hljs-title function_">shareFuel</span>(<span class="hljs-params"><span class="hljs-attr">fuelType</span>: <span class="hljs-built_in">string</span>, <span class="hljs-attr">receiverPlayerId</span>: <span class="hljs-built_in">string</span></span>) { <span class="hljs-comment">/* db.update */</span> }
  <span class="hljs-title function_">sendMessage</span>(<span class="hljs-params"><span class="hljs-attr">text</span>: <span class="hljs-built_in">string</span></span>)  { <span class="hljs-comment">/* db.insertDurable with tier: &quot;edge&quot; */</span> }
  <span class="hljs-title function_">updateState</span>(<span class="hljs-params"><span class="hljs-attr">state</span>: <span class="hljs-title class_">PlayerInit</span></span>) { <span class="hljs-comment">/* db.updateDurable if changed */</span> }
}
</code></pre>
<p>The game engine calls these methods synchronously. Writes that need durability guarantees use <code>insertDurable</code>/<code>updateDurable</code> with <code>tier: &quot;edge&quot;</code>. Hot-path writes like <code>collectDeposit</code> use eventually consistent <code>db.update</code> for instant local-store updates.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="10" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="collecting-a-deposit">Collecting a deposit</h2>
<div style="display:grid;grid-template-columns:3fr 2fr;gap:1.5rem;margin-top:0.4rem">
<div>
<p>When the player walks over a fuel deposit, <code>collectDeposit</code> fires immediately:</p>
<pre><code class="language-typescript"><span class="hljs-comment">// src/jazz/SyncManager.ts - collectDeposit()</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">db</span>.<span class="hljs-title function_">update</span>(app.<span class="hljs-property">fuel_deposits</span>, id, {
  <span class="hljs-attr">collected</span>: <span class="hljs-literal">true</span>,
  <span class="hljs-attr">collectedBy</span>: <span class="hljs-variable language_">this</span>.<span class="hljs-property">playerId</span>,
});
</code></pre>
<p>This uses eventually consistent <code>db.update</code> so the local store updates instantly. The write still propagates to the server and fans out to every other client's <code>useAll(fuel_deposits.where({ collected: false }))</code> subscription, and the deposit disappears from their surface.</p>
</div>
<div>
<img src="screenshots/03-player-walking.png" style="width:100%;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,0.15)" />
<blockquote>
<strong>Concurrent collect?</strong> Both writes go through with <code>collected: true</code>. Last-write-wins resolves <code>collectedBy</code> to whichever timestamp arrived at the edge later. One player wins, the other's collection is silently overwritten on sync. No locks, no errors.
</blockquote>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="sharing-fuel-cross-client">Sharing fuel cross-client</h2>
<p>When Player A gives a deposit to Player B, no new row is created. A updates <code>collectedBy</code>:</p>
<pre><code class="language-typescript"><span class="hljs-comment">// src/jazz/SyncManager.ts - shareFuel()</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">db</span>.<span class="hljs-title function_">update</span>(app.<span class="hljs-property">fuel_deposits</span>, shareId, {
  <span class="hljs-attr">collectedBy</span>: receiverPlayerId,
});
</code></pre>
<p>Player B's <code>useAll(app.fuel_deposits.where({ collected: true }))</code> subscription already contains the row. The <code>collectedBy</code> update propagates as a plain row update, so Player B's inventory reflects the share immediately.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="releasing-a-deposit-delete--insert">Releasing a deposit: DELETE + INSERT</h2>
<p>When a player refuels their lander, the deposit is returned to the surface. Rather than updating <code>collected: false</code> on the existing row, the code deletes it and inserts a fresh one:</p>
<pre><code class="language-typescript"><span class="hljs-comment">// src/jazz/SyncManager.ts - releaseDeposit()</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">db</span>.<span class="hljs-title function_">delete</span>(app.<span class="hljs-property">fuel_deposits</span>, depId);
<span class="hljs-variable language_">this</span>.<span class="hljs-property">db</span>.<span class="hljs-title function_">insert</span>(app.<span class="hljs-property">fuel_deposits</span>, {
  fuelType,
  positionX,
  <span class="hljs-attr">createdAt</span>: <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">floor</span>(<span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>() / <span class="hljs-number">1000</span>),
  <span class="hljs-attr">collected</span>: <span class="hljs-literal">false</span>,
  <span class="hljs-attr">collectedBy</span>: <span class="hljs-string">&quot;&quot;</span>,
});
</code></pre>
<p>The eventually consistent <code>delete</code> + <code>insert</code> updates the local store immediately. The fresh INSERT is picked up by all clients' <code>where({ collected: false })</code> subscriptions, so the deposit reappears on everyone's surface.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="14" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;screenshots/01-game-landed.png&quot;);background-size:88%;"></figure></div></section></foreignObject><foreignObject width="62%" height="720"><section id="13" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;--marpit-advanced-background-split:38%;" data-marpit-pagination-total="14" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="player-state-sync">Player state sync</h2>

<p>Every player's position, velocity, fuel level, and mode are written to the <code>players</code> table. SyncManager skips the write if nothing meaningful has changed, using configurable thresholds:</p>
<pre><code class="language-typescript"><span class="hljs-comment">// src/jazz/SyncManager.ts - updateState()</span>
<span class="hljs-keyword">if</span> (!<span class="hljs-variable language_">this</span>.<span class="hljs-property">dbRowId</span>) <span class="hljs-keyword">return</span>;
<span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.<span class="hljs-property">lastSynced</span> &amp;&amp; !<span class="hljs-title function_">playerStateChanged</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">lastSynced</span>, state)) <span class="hljs-keyword">return</span>;
<span class="hljs-variable language_">this</span>.<span class="hljs-property">lastSynced</span> = { ...state };
<span class="hljs-variable language_">this</span>.<span class="hljs-property">db</span>.<span class="hljs-title function_">updateDurable</span>(app.<span class="hljs-property">players</span>, <span class="hljs-variable language_">this</span>.<span class="hljs-property">dbRowId</span>, state, { <span class="hljs-attr">tier</span>: <span class="hljs-string">&quot;edge&quot;</span> });
</code></pre>
<p>Player insert happens once, after the edge subscription has settled:</p>
<pre><code class="language-typescript"><span class="hljs-comment">// src/jazz/SyncManager.ts - setInputs(), after settled</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">db</span>.<span class="hljs-title function_">insertDurable</span>(app.<span class="hljs-property">players</span>, state, { <span class="hljs-attr">tier</span>: <span class="hljs-string">&quot;edge&quot;</span> })
  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">row</span>) =&gt;</span> { <span class="hljs-variable language_">this</span>.<span class="hljs-property">dbRowId</span> = row.<span class="hljs-property">id</span>; });
</code></pre>
<p>Every other client's <code>useAll(app.players.where({ playerId: { ne: myId } }))</code> subscription updates automatically, keeping the remote lander in sync. (<code>ne</code> is Jazz's &quot;not equal&quot; operator, which excludes the local player's own row.)</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="13" style="" data-marpit-pagination-total="14" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:nomrmlxij8qbjjoo0cqru18lzec4us1xrut7cyrg60k;" data-marpit-pagination-total="14">
<h2 id="jazz-api-surface-used-in-moon-lander">Jazz API surface used in Moon Lander</h2>
<table>
<thead>
<tr>
<th>API</th>
<th>Used for</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>JazzProvider</code></td>
<td>Wrap the app; handles WASM worker + OPFS + sync internally</td>
</tr>
<tr>
<td><code>useDb()</code></td>
<td>Access the db write API from any component</td>
</tr>
<tr>
<td><code>useAll(query, tier?)</code></td>
<td>Live subscription; re-renders on every remote or local change</td>
</tr>
<tr>
<td><code>db.insert(table, data)</code></td>
<td>Eventually consistent insert. Instant local update, propagates in background</td>
</tr>
<tr>
<td><code>db.update(table, id, data)</code></td>
<td>Eventually consistent update. Instant local update, propagates in background</td>
</tr>
<tr>
<td><code>db.delete(table, id)</code></td>
<td>Eventually consistent delete. Used before re-inserting a released deposit</td>
</tr>
<tr>
<td><code>db.insertDurable(table, data, { tier })</code></td>
<td>Durable insert. Promise resolves when tier confirms</td>
</tr>
<tr>
<td><code>db.updateDurable(table, id, data, { tier })</code></td>
<td>Durable update. Used for player state sync at <code>&quot;edge&quot;</code> tier</td>
</tr>
</tbody>
</table>
