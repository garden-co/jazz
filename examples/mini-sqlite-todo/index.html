<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mini-jazz-sqlite WASM Todos</title>
    <style>
      :root {
        color: #18211f;
        background: #f6f7f4;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 1px solid #24352f;
        background: #24352f;
        color: #ffffff;
        cursor: pointer;
        min-height: 2.5rem;
        padding: 0 0.9rem;
        border-radius: 6px;
      }

      button:hover:not(:disabled) {
        background: #17231f;
      }

      button:disabled,
      input:disabled,
      select:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      #app {
        width: min(760px, calc(100vw - 32px));
        margin: 48px auto;
      }

      .app-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        border-bottom: 1px solid #d8ded6;
        padding-bottom: 18px;
      }

      .eyebrow,
      .status,
      .summary,
      .empty-state,
      .error-message {
        margin: 0;
        color: #596760;
        font-size: 0.9rem;
      }

      .eyebrow {
        color: #687a40;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 4px 0 0;
        font-size: 2.4rem;
        line-height: 1;
      }

      .scope-controls {
        display: grid;
        grid-template-columns: minmax(120px, 0.7fr) minmax(180px, 1fr) minmax(180px, 1.2fr);
        gap: 12px;
        align-items: end;
        margin-top: 22px;
      }

      .field,
      .controls label {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .field span,
      .controls label span {
        color: #596760;
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .todo-form {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(180px, 0.7fr) auto;
        gap: 10px;
        margin-top: 22px;
      }

      .todo-form input,
      .controls input:not([type="checkbox"]),
      .controls select,
      .field select {
        width: 100%;
        min-height: 2.5rem;
        border: 1px solid #b7c1ba;
        border-radius: 6px;
        background: #ffffff;
        color: #18211f;
        padding: 0 0.85rem;
      }

      .field select {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .group-list {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        min-width: 0;
        min-height: 2.5rem;
        align-content: end;
      }

      .group-chip,
      .todo-tags span {
        border: 1px solid #c5cdbf;
        border-radius: 999px;
        background: #ffffff;
        color: #24352f;
        font-size: 0.86rem;
        line-height: 1.8rem;
        max-width: 100%;
        overflow: hidden;
        padding: 0 0.7rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .group-chip.muted {
        color: #6b756f;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 142px 142px auto;
        gap: 10px;
        margin-top: 12px;
      }

      .table-stats-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 2.5rem;
        color: #596760;
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .table-stats-toggle input {
        width: 18px;
        height: 18px;
        accent-color: #687a40;
      }

      .label-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 34px;
        margin-top: 14px;
      }

      .chip {
        min-height: 2rem;
        border-color: #b7c1ba;
        border-radius: 999px;
        background: #ffffff;
        color: #24352f;
        font-size: 0.82rem;
        line-height: 1;
        padding: 0 0.75rem;
      }

      .chip:hover:not(:disabled),
      .chip.selected {
        border-color: #2f66c3;
        background: #e9f0ff;
        color: #163d82;
      }

      .generate {
        margin-top: 12px;
      }

      .error-message {
        color: #a33b2b;
        font-weight: 700;
        margin-top: 14px;
      }

      .todo-list {
        display: grid;
        gap: 8px;
        list-style: none;
        margin: 18px 0 0;
        padding: 0;
      }

      .todo-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        border-bottom: 1px solid #dfe5dd;
        padding: 7px 0;
      }

      .todo-label {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .todo-label span {
        display: grid;
        gap: 2px;
        overflow-wrap: anywhere;
      }

      .todo-label strong {
        font-weight: 700;
      }

      .todo-title {
        cursor: text;
      }

      .todo-title-editor {
        width: min(100%, 28rem);
        min-height: 2rem;
        border: 1px solid #90a096;
        border-radius: 6px;
        background: #ffffff;
        color: #18211f;
        padding: 0 0.6rem;
      }

      .todo-label small {
        color: #687a40;
        font-size: 0.82rem;
      }

      .todo-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 3px;
      }

      .todo-tags span {
        font-size: 0.74rem;
        line-height: 1.35rem;
        padding: 0 0.55rem;
      }

      .todo-label input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #687a40;
      }

      .todo-item.done span {
        color: #6b756f;
        text-decoration: line-through;
      }

      .todo-item button {
        background: transparent;
        border-color: #b7c1ba;
        color: #24352f;
      }

      .todo-item button:hover {
        background: #ecefe9;
      }

      .empty-state,
      .summary {
        margin-top: 16px;
      }

      @media (max-width: 560px) {
        #app {
          margin: 24px auto;
        }

        .app-header,
        .scope-controls,
        .todo-form,
        .controls,
        .todo-item {
          grid-template-columns: 1fr;
        }

        .app-header {
          display: grid;
          align-items: start;
          gap: 10px;
        }

        .todo-item button {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
