[package]
name = "mini-sqlite-todo-yew"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "mini-sqlite-todo-yew"
path = "src/main.rs"

[[bin]]
name = "worker"
path = "src/bin/worker.rs"

[[bin]]
name = "mini-sqlite-todo-yew-server"
path = "src/bin/server.rs"

[dependencies]
console_error_panic_hook = "0.1"
mini-jazz-sqlite = { path = "../../crates/mini-jazz-sqlite" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
  "console",
  "DedicatedWorkerGlobalScope",
  "ErrorEvent",
  "Event",
  "HtmlInputElement",
  "HtmlSelectElement",
  "InputEvent",
  "MessageEvent",
  "SubmitEvent",
  "CloseEvent",
  "Storage",
  "Worker",
  "WebSocket",
  "Window",
] }
yew = { version = "0.23", features = ["csr"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
sqlite-wasm-rs = "0.5"
sqlite-wasm-vfs = "0.2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
axum = { version = "0.7", features = ["ws"] }
dotenvy = "0.15"
futures-util = "0.3"
opentelemetry = { version = "0.32", features = ["logs"] }
opentelemetry-appender-tracing = "0.32"
opentelemetry-otlp = { version = "0.32", features = [
  "http-json",
  "logs",
  "reqwest-blocking-client",
] }
opentelemetry_sdk = { version = "0.32", features = ["logs", "rt-tokio"] }
tokio = { version = "1", features = ["full"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }
uuid = { version = "1", features = ["v4"] }
