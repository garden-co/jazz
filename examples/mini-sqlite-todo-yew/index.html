<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mini-sqlite-todo-yew</title>
    <link data-trunk rel="rust" data-bin="mini-sqlite-todo-yew" />
    <link data-trunk rel="rust" data-bin="worker" data-type="worker" data-loader-shim />
    <style>
      :root {
        color: #1b211f;
        background: #f6f7f4;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      button,
      input {
        font: inherit;
      }

      button {
        min-height: 2.5rem;
        border: 1px solid #25352f;
        border-radius: 6px;
        background: #25352f;
        color: #fff;
        cursor: pointer;
        padding: 0 0.9rem;
      }

      button:hover:not(:disabled) {
        background: #17231f;
      }

      button:disabled,
      input:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .todo-app {
        width: min(720px, calc(100vw - 32px));
        margin: 48px auto;
      }

      .app-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        border-bottom: 1px solid #d8ded6;
        padding-bottom: 18px;
      }

      .eyebrow,
      .status,
      .summary,
      .empty-state,
      .error-message {
        margin: 0;
        color: #596760;
        font-size: 0.9rem;
      }

      .eyebrow {
        color: #687a40;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 4px 0 0;
        font-size: 2.4rem;
        line-height: 1;
      }

      .todo-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        margin-top: 22px;
      }

      .todo-form input {
        width: 100%;
        min-height: 2.5rem;
        border: 1px solid #b7c1ba;
        border-radius: 6px;
        background: #fff;
        color: #1b211f;
        padding: 0 0.85rem;
      }

      .generate {
        margin-top: 12px;
      }

      .error-message {
        color: #a33b2b;
        font-weight: 700;
        margin-top: 14px;
      }

      .todo-list {
        display: grid;
        gap: 8px;
        list-style: none;
        margin: 18px 0 0;
        padding: 0;
      }

      .todo-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        border-bottom: 1px solid #dfe5dd;
        padding: 7px 0;
      }

      .todo-label {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .todo-label span {
        overflow-wrap: anywhere;
      }

      .todo-label input {
        width: 18px;
        height: 18px;
        accent-color: #687a40;
      }

      .todo-item.done span {
        color: #6b756f;
        text-decoration: line-through;
      }

      .todo-item button {
        border-color: #b7c1ba;
        background: transparent;
        color: #25352f;
      }

      .todo-item button:hover {
        background: #ecefe9;
      }

      .empty-state,
      .summary {
        margin-top: 16px;
      }

      @media (max-width: 560px) {
        .todo-app {
          margin-top: 24px;
        }

        .app-header,
        .todo-form {
          grid-template-columns: 1fr;
        }

        .app-header {
          align-items: start;
          display: grid;
        }
      }
    </style>
  </head>
  <body></body>
</html>
