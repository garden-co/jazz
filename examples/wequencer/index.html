<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wequencer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #1c1816;
        color: #e8e0d8;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      #app {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1.5rem;
        background: #231e1a;
        border-bottom: 2px solid #3d3530;
        position: relative;
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      nav h1 {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #f0a030;
      }
      .share-btn {
        padding: 0.3rem 0.75rem;
        border: 1px solid #3d3530;
        border-radius: 0.25rem;
        background: transparent;
        color: #a89888;
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      .share-btn:hover {
        border-color: #f0a030;
        color: #f0a030;
      }
      .history-popover {
        position: absolute;
        top: 100%;
        left: 1.5rem;
        margin-top: 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: #231e1a;
        border: 1px solid #3d3530;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        z-index: 10;
      }
      .history-input {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 0.85rem;
        background: #1c1816;
        border: 1px solid #3d3530;
        border-radius: 0.25rem;
        color: #e8ddd0;
        padding: 0.3rem 0.5rem;
      }
      .history-go {
        padding: 0.3rem 0.75rem;
        border: 1px solid #3d3530;
        border-radius: 0.25rem;
        background: transparent;
        color: #a89888;
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
      }
      .history-go:hover {
        border-color: #f0a030;
        color: #f0a030;
      }
      .history-error {
        font-size: 0.75rem;
        color: #dc4040;
      }
      .transport {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: #1c1816;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        border: 1px solid #3d3530;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      }
      .bpm-control {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .bpm-btn {
        width: 1.5rem;
        height: 1.5rem;
        padding: 0;
        border: 1px solid #3d3530;
        border-radius: 0.2rem;
        background: transparent;
        color: #a89888;
        font-family: "Space Grotesk", monospace;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        line-height: 1;
      }
      .bpm-btn:hover {
        border-color: #f0a030;
        color: #f0a030;
      }
      .bpm-value {
        font-family: "Space Grotesk", monospace;
        font-size: 1.1rem;
        color: #f0a030;
        min-width: 2rem;
        text-align: center;
      }
      .bpm-label {
        font-size: 0.6rem;
        text-transform: uppercase;
        color: #6b5f55;
      }
      .display {
        font-family: "Space Grotesk", monospace;
        font-size: 1.25rem;
        display: flex;
        gap: 0.5rem;
        align-items: baseline;
        color: #f0a030;
      }
      .bar-label,
      .beat-label {
        font-size: 0.6rem;
        text-transform: uppercase;
        color: #6b5f55;
      }
      .play-btn,
      .stop-btn {
        padding: 0.4rem 1rem;
        border: none;
        border-radius: 0.25rem;
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-weight: 700;
        cursor: pointer;
        font-size: 0.9rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .play-btn {
        background: #4ade80;
        color: #1c1816;
      }
      .play-btn:hover {
        background: #6ee7a0;
      }
      .stop-btn {
        background: #dc4040;
        color: #fff;
        animation: pulse-glow 1.5s infinite;
      }
      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 8px rgba(220, 64, 64, 0.4);
        }
        50% {
          opacity: 0.8;
          box-shadow: 0 0 16px rgba(220, 64, 64, 0.6);
        }
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1rem;
      }
      .sequencer {
        overflow: hidden;
        background: #2a2420;
        border: 2px solid #3d3530;
        border-radius: 0.5rem;
        padding: 0.5rem;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }
      .master-volume {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.25rem 0.5rem;
        border-bottom: 1px solid #3d3530;
        margin-bottom: 0.25rem;
      }
      .master-label {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        color: #6b5f55;
        letter-spacing: 0.04em;
      }
      .grid {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 0.5rem;
      }
      .instrument-row {
        display: flex;
        flex-direction: column;
      }
      .instrument-beat-row {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .beat-cells {
        display: flex;
        gap: 4px;
        flex: 1;
        min-width: 0;
        overflow-x: auto;
      }
      .instrument-name {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        width: 5.5rem;
        flex-shrink: 0;
        padding: 0.2rem 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #9a8e82;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: none;
        border: none;
        cursor: pointer;
        text-align: left;
      }
      .instrument-name::after {
        content: "\25B8";
        font-size: 0.65rem;
        margin-left: 0.2rem;
        color: #6b5f55;
        display: inline-block;
        transition: transform 0.15s ease;
      }
      .instrument-name.mixer-open::after {
        transform: rotate(90deg);
      }
      .instrument-name:hover,
      .instrument-name.mixer-open {
        color: #f0a030;
      }
      .instrument-name:hover::after,
      .instrument-name.mixer-open::after {
        color: #f0a030;
      }
      .instrument-mixer {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        padding: 0.4rem 0 0.4rem 0.25rem;
        border-top: 1px solid #3d3530;
      }
      .mixer-label {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        color: #6b5f55;
        letter-spacing: 0.04em;
      }
      .vol-slider,
      .pan-slider {
        width: 5rem;
        accent-color: #f0a030;
        cursor: pointer;
      }
      .pan-slider {
        width: 4rem;
        accent-color: #6b5f55;
      }
      .beat-cell {
        aspect-ratio: 1;
        width: 2rem;
        height: 2rem;
        flex-shrink: 0;
        border: 1px solid #3d3530;
        border-radius: 3px;
        background: #1c1816;
        cursor: pointer;
        transition:
          background-color 0.1s,
          box-shadow 0.1s;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      .beat-cell.downbeat {
        border-color: #d4602a;
      }
      .beat-cell:hover {
        background: #352e28;
      }
      .beat-cell.current:not(.active) {
        box-shadow:
          inset 0 1px 2px rgba(0, 0, 0, 0.3),
          0 0 6px rgba(240, 160, 48, 0.3);
      }
      .participants {
        background: #2a2420;
        border: 2px solid #3d3530;
        border-radius: 0.5rem;
        padding: 1rem;
        min-width: 200px;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }
      .participants h2 {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #f0a030;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .participant {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0;
      }
      .participant.is-me {
        background: rgba(240, 160, 48, 0.06);
        border-radius: 0.25rem;
        padding: 0.4rem;
      }
      .avatar {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid #3d3530;
      }
      .name {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .name.editable {
        cursor: pointer;
        border-bottom: 1px dashed transparent;
      }
      .name.editable:hover {
        border-bottom-color: #6b5f55;
      }
      .name-input {
        font-weight: 600;
        font-size: 0.9rem;
        font-family: inherit;
        background: rgba(240, 160, 48, 0.1);
        border: 1px solid #f0a030;
        border-radius: 0.25rem;
        color: inherit;
        padding: 0.1rem 0.3rem;
        outline: none;
        width: 8rem;
      }
      .you-tag {
        font-size: 0.75rem;
        color: #6b5f55;
      }
      .sync-toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid #3d3530;
        font-size: 0.85rem;
        color: #6b5f55;
        cursor: pointer;
        transition: color 0.15s;
      }
      .sync-toggle:hover {
        color: #9a8e82;
      }
      .sync-toggle input[type="checkbox"] {
        accent-color: #f0a030;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .start-prompt {
        text-align: center;
      }
      .start-prompt button {
        padding: 1rem 2rem;
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        border: none;
        border-radius: 0.5rem;
        background: #f0a030;
        color: #1c1816;
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        box-shadow: 0 0 20px rgba(240, 160, 48, 0.3);
      }
      .start-prompt button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(240, 160, 48, 0.5);
      }
      .loading {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 1.25rem;
        color: #6b5f55;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
