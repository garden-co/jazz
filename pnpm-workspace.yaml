packages:
  - docs
  - packages/*
  - crates/jazz-rn
  - starters/*
  - examples/*
  # React Native/Expo surfaces are paused; keep their source archived but out of active workspace installs.
  - "!examples/todo-client-localfirst-expo"
  - examples/docs/*
  - "!examples/docs/todo-client-localfirst-expo"
  - dev/stress-tests/*
  - "!dev/stress-tests/stress-test-expo"
  - dev/local-telemetry/web
  - crates
  - crates/jazz-wasm
  - crates/jazz-napi

catalogs:
  default:
    "@sveltejs/vite-plugin-svelte": 7.0.0
    "@types/node": "^22.0.0"
    "@vitest/browser": 4.1.0
    "@vitest/browser-playwright": 4.1.0
    "@vitejs/plugin-react": 6.0.1
    "@vitejs/plugin-vue": 6.0.4
    svelte-check: "^4.0.0"
    typescript: 6.0.2
    vite: 8.0.1
    vite-plugin-solid: 2.11.12
    "vite-plugin-top-level-await": 1.6.0
    "vite-plugin-wasm": 3.6.0
    vitest: 4.1.0
    vue-tsc: "^2.1.10"

ignoredBuiltDependencies:
  - blake3

allowBuilds:
  "@swc/core": true
  esbuild: true
  lefthook: true
  protobufjs: true
  sharp: true
  workerd: true

overrides:
  react: 19.2.4
  react-dom: 19.2.4
