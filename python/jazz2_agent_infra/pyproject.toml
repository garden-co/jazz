[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "jazz2-agent-infra"
version = "0.1.0"
description = "Python bindings for the Jazz2 agent-infra backend."
requires-python = ">=3.9"
readme = "README.md"
license = { text = "MIT" }

[tool.setuptools.packages.find]
where = ["src"]
