<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>opfs-btree storage benchmark</title>
  </head>
  <body>
    <main id="app"></main>
    <link data-trunk rel="copy-dir" href="../../../dev/benchmarks/storage/data" />
    <link data-trunk rel="rust" data-bin="opfs-btree-bench-harness" />
    <link
      data-trunk
      rel="rust"
      data-bin="btree-worker"
      data-type="worker"
      data-bindgen-target="web"
    />
    <link
      data-trunk
      rel="rust"
      data-bin="sqlite-worker"
      data-type="worker"
      data-cargo-features="sqlite-worker"
      data-bindgen-target="web"
    />
  </body>
</html>
