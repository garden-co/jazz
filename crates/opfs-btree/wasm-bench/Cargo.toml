[workspace]
members = ["sqlite"]

[package]
name = "opfs-btree-bench-harness"
version = "0.0.0"
edition = "2024"
publish = false

[[bin]]
name = "opfs-btree-bench-harness"
path = "src/main.rs"

[[bin]]
name = "btree-worker"
path = "src/bin/btree_worker.rs"

[[bin]]
name = "sqlite-worker"
path = "src/bin/sqlite_worker.rs"

[lib]
path = "src/lib.rs"

[features]
default = []
sqlite-worker = ["dep:wasm-sqlite"]

[dependencies]
bench-core = { package = "jazz-storage-bench-core", path = "../../../dev/benchmarks/storage/bench-core" }
wasm-sqlite = { package = "opfs-btree-wasm-sqlite", path = "sqlite", optional = true }
gloo-net = "0.6"
gloo-worker = "0.6"
js-sys = "0.3"
opfs-btree = { path = ".." }
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
  "Document",
  "Element",
  "Location",
  "UrlSearchParams",
  "Window",
] }
yew = { version = "0.21", features = ["csr"] }
