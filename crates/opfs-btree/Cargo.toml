[package]
name = "opfs-btree"
version = "0.1.0"
edition = "2024"
description = "Cross-platform B-Tree storage used by Jazz core."
license = "MIT OR Apache-2.0"
repository = "https://github.com/garden-co/jazz2"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
compare-native = ["dep:bf-tree", "dep:rocksdb", "dep:fjall", "dep:surrealkv", "dep:tokio"]

[dependencies]
crc32fast = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bf-tree = { version = "0.4.8", optional = true }
rocksdb = { version = "0.24", default-features = false, features = ["lz4"], optional = true }
fjall = { version = "3.0.2", optional = true }
surrealkv = { version = "0.20.1", optional = true }
tokio = { version = "1", features = ["rt-multi-thread"], optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde-wasm-bindgen = "0.6"
web-sys = { version = "0.3", features = [
  "WorkerGlobalScope",
  "WorkerNavigator",
  "Navigator",
  "StorageManager",
  "FileSystemDirectoryHandle",
  "FileSystemFileHandle",
  "FileSystemGetFileOptions",
  "FileSystemSyncAccessHandle",
  "FileSystemReadWriteOptions",
] }

[[bench]]
name = "compare_native"
harness = false
required-features = ["compare-native"]
