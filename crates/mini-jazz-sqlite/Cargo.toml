[package]
name = "mini-jazz-sqlite"
version = "0.1.0"
edition = "2021"

[features]
test = []

[dependencies]
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1"
lz4_flex = "0.11"
postcard = { version = "1", features = ["alloc"] }
sha2 = "0.10"
bincode = "1"

[dev-dependencies]
tempfile = "3"
