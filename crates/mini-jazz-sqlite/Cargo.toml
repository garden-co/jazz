[package]
name = "mini-jazz-sqlite"
version = "0.1.0"
edition = "2021"

[features]
test = []

[dependencies]
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rusqlite = { version = "0.40", features = ["bundled", "limits"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
rusqlite = { version = "0.40", default-features = false, features = [
  "cache",
  "ffi-sqlite-wasm-rs",
] }

[dev-dependencies]
tempfile = "3"
