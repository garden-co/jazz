[package]
name = "bf-tree-wasm-tests"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
bf-tree = { path = "../.." }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Performance", "Window", "WorkerGlobalScope", "DedicatedWorkerGlobalScope"] }
js-sys = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"

# Required for OPFS unstable APIs
[package.metadata.wasm-pack.profile.dev]
# Enable web_sys_unstable_apis for development builds
[package.metadata.wasm-pack.profile.release]
# Enable web_sys_unstable_apis for release builds
