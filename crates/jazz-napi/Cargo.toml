[package]
name = "jazz-napi"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
jazz_tools = { package = "jazz-tools", path = "../jazz-tools", version = "2.0.0-alpha.0", default-features = false, features = [
  "test-utils",
] }
base64 = "0.22"
napi = { version = "3", features = ["napi5", "serde-json", "async"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
uuid = { version = "1", features = ["v7"] }

[build-dependencies]
napi-build = "2"
