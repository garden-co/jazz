[package]
name = "groove"
version = "0.1.0"
edition = "2024"

[dependencies]
uuid = { version = "1", features = ["v5", "v7"] }
blake3 = "1"
rand = "0.8"
serde_json = "1"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "insert_benchmark"
harness = false

[[bench]]
name = "update_benchmark"
harness = false

[[bench]]
name = "subscription_benchmark"
harness = false

[[bench]]
name = "memory_benchmark"
harness = false
