[package]
name = "groove"
version = "0.1.0"
edition = "2024"

[features]
default = []
bftree = ["bf-tree"]
jazz-lsm = ["dep:jazz-lsm"]

[dependencies]
bf-tree = { path = "../bf-tree", optional = true, features = ["tracing"] }
jazz-lsm = { path = "../jazz-lsm", optional = true }
futures = "0.3"
tracing = "0.1"
uuid = { version = "1", features = ["v5", "v7", "serde"] }
blake3 = "1"
hex = "0.4"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
internment = "0.8"
smallvec = { version = "1.11", features = ["serde"] }
smolset = "1.3"
web-time = "1.1"
small-map = "0.1"
bitvec = "1.0"
ahash = "0.8"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "insert_benchmark"
harness = false

[[bench]]
name = "update_benchmark"
harness = false

[[bench]]
name = "subscription_benchmark"
harness = false

[[bench]]
name = "memory_benchmark"
harness = false

[[bench]]
name = "projection_benchmark"
harness = false
