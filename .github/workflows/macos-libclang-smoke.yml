name: macOS libclang smoke

on:
  push:
    branches:
      - fix/benchmark-libclang
  workflow_dispatch:

concurrency:
  group: macos-libclang-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-cli-macos-arm64:
    name: Build CLI macOS (arm64 smoke)
    if: github.ref == 'refs/heads/fix/benchmark-libclang'
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build CLI binary
        run: scripts/with-macos-libclang-env.sh cargo build -p jazz-tools --bin jazz-tools --features cli --release --target aarch64-apple-darwin

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: jazz-tools-darwin-arm64-smoke
          path: target/aarch64-apple-darwin/release/jazz-tools
          if-no-files-found: error
