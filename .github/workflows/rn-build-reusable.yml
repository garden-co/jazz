name: Build jazz-rn (React Native)

"on":
  workflow_call:
    inputs:
      concurrency:
        type: string
        default: rn
        description: Concurrency group suffix for this workflow
      disableAndroid:
        type: boolean
        default: false
        description: Skip Android build job
      disableIOS:
        type: boolean
        default: false
        description: Skip iOS build job
      checkoutRef:
        type: string
        default: ""
        description: Git ref to check out.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.concurrency }}
  cancel-in-progress: true

env:
  CACHE_SCOPE_REPOSITORY_ID: ${{ github.event.pull_request.head.repo.id || github.repository_id }}
  PACKAGE_PATH: crates/jazz-rn
  PACKAGE_NAME: jazz-rn

jobs:
  build-android:
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G
    name: Build Android artifacts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !inputs.disableAndroid }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkoutRef || github.sha }}

      - name: Setup Source Code
        uses: ./.github/actions/source-code/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.93.1
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@bbd0a7de0e936c8c626fa0e93584169d58ff1307 # main

      - name: Install cargo-ndk
        run: cargo binstall cargo-ndk

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          key: repo-${{ env.CACHE_SCOPE_REPOSITORY_ID }}

      - uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9 # v2
        with:
          tool: sccache

      - name: Mount sccache sticky disk
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88 # v1
        with:
          key: sccache-${{ env.CACHE_SCOPE_REPOSITORY_ID }}-${{ runner.os }}-v1
          path: /home/runner/.cache/sccache

      - name: Show sccache stats (before build)
        run: sccache --show-stats || true

      - name: Build Android artifacts
        run: pnpm --filter ${{ env.PACKAGE_NAME }} run build:rn:android

      - name: Show sccache stats (after build)
        run: sccache --show-stats || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jazz-rn-android
          if-no-files-found: error
          path: |
            ${{ env.PACKAGE_PATH }}/android/src/main/jniLibs
            ${{ env.PACKAGE_PATH }}/android/src/main/java
            ${{ env.PACKAGE_PATH }}/cpp/generated

  build-ios:
    name: Build iOS artifacts
    runs-on: blacksmith-6vcpu-macos-15
    if: ${{ !inputs.disableIOS }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkoutRef || github.sha }}

      - name: Setup Source Code
        uses: ./.github/actions/source-code/
        with:
          cache: "false"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.93.1
          targets: |
            aarch64-apple-ios
            aarch64-apple-ios-sim
            x86_64-apple-ios

      - name: Build iOS artifacts
        run: pnpm --filter ${{ env.PACKAGE_NAME }} run build:rn:ios

      - name: Upload iOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jazz-rn-ios
          if-no-files-found: error
          path: |
            ${{ env.PACKAGE_PATH }}/JazzRnFramework.xcframework
            ${{ env.PACKAGE_PATH }}/ios
            ${{ env.PACKAGE_PATH }}/cpp/generated
