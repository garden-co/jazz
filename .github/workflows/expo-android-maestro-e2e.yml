name: Expo Android E2E (Maestro Cloud)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - packages/jazz-tools/**
      - examples/todo-client-localfirst-expo/**
      - Cargo.toml
      - Cargo.lock
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/expo-android-maestro-e2e.yml
      - scripts/expo-android-maestro-e2e.sh

concurrency:
  group: expo-android-maestro-e2e-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  expo-android-e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    env:
      JAZZ_E2E_APP_ID: 6316f08d-d5d1-41df-82b8-8c16aa26db84
      JAZZ_E2E_ADMIN_SECRET: d0a2f110-36a8-45b9-8632-ecbc09128e2a
      JAZZ_E2E_SERVER_PORT: "1625"
      COREPACK_HOME: /home/runner/.local/share/corepack
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: useblacksmith/setup-node@v5
        with:
          # Keep Node pinned for RN/Expo stability in this workflow.
          node-version: "22"

      - name: Enable Corepack and pin pnpm
        run: |
          set -euo pipefail
          mkdir -p "${COREPACK_HOME}"
          corepack enable
          corepack prepare pnpm@10.14.0 --activate
          node --version
          pnpm --version

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown, aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android, x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Verify Rust toolchain binaries
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          wasm-pack --version
          sccache --version

      - name: Validate required CI secrets
        env:
          MAESTRO_KEY: ${{ secrets.MAESTRO_KEY }}
          MAESTRO_PROJECT_ID: ${{ secrets.MAESTRO_PROJECT_ID }}
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
        run: scripts/expo-android-maestro-e2e.sh validate-secrets

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Ensure npm wasm-pack binary is executable
        run: scripts/expo-android-maestro-e2e.sh ensure-wasm-pack-binary

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - name: Install cross-compile linker prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Mount sccache sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: sccache-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/sccache

      - name: Build all workspace packages
        run: |
          set -euo pipefail
          sccache --show-stats || true

          # `build:all` includes jazz-rn iOS native artifacts.
          # This workflow runs on Linux, so we run the Linux-equivalent set:
          # 1) explicit jazz-rn Android native payload build
          # 2) workspace build (same as CI)
          pnpm --filter jazz-rn build:rn:android
          pnpm build

          sccache --show-stats || true

      - name: Install Vercel Sandbox CLI
        run: |
          set -euo pipefail
          npm install -g sandbox
          sandbox --version

      - name: Generate Expo Android project (prebuild)
        run: |
          set -euo pipefail
          pnpm --filter todo-client-localfirst-expo verify:expo:android
          test -f examples/todo-client-localfirst-expo/android/gradlew

      - name: Start Vercel Sandbox and run jazz-tools server
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: scripts/expo-android-maestro-e2e.sh start-sandbox-server

      - name: Build Expo Android release APK
        env:
          EXPO_PUBLIC_JAZZ_APP_ID: ${{ env.JAZZ_E2E_APP_ID }}
          EXPO_PUBLIC_JAZZ_ADMIN_SECRET: ${{ env.JAZZ_E2E_ADMIN_SECRET }}
          EXPO_PUBLIC_JAZZ_SERVER_URL: ${{ env.SERVER_PUBLIC_URL }}
        run: scripts/expo-android-maestro-e2e.sh build-expo-apk

      - name: Ensure APK exists
        run: |
          set -euo pipefail
          test -f examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk

      - name: Run Maestro Cloud flows
        id: maestro
        uses: mobile-dev-inc/action-maestro-cloud@v2
        with:
          api-key: ${{ secrets.MAESTRO_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk
          workspace: .maestro

      - name: Fetch sandbox server log
        if: always()
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: scripts/expo-android-maestro-e2e.sh fetch-sandbox-server-log

      - name: Verify server communication evidence
        if: always() && (steps.maestro.outcome == 'success' || steps.maestro.outcome == 'failure')
        run: scripts/expo-android-maestro-e2e.sh verify-server-evidence

      - name: Stop Vercel Sandbox
        if: always()
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: scripts/expo-android-maestro-e2e.sh stop-sandbox

      - name: Upload server and sandbox logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-android-maestro-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            server.log
            vercel-sandbox.log
          if-no-files-found: warn
