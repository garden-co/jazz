name: Expo Android E2E (Maestro Cloud)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - packages/jazz-tools/**
      - examples/todo-client-localfirst-expo/**
      - Cargo.toml
      - Cargo.lock
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/expo-android-maestro-e2e.yml
      - scripts/expo-android-maestro-e2e.sh

concurrency:
  group: expo-android-maestro-e2e-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-rn:
    name: Build jazz-rn (Android and iOS) artifacts
    uses: ./.github/workflows/rn-build-reusable.yml
    with:
      concurrency: e2e-rn-test
      disableAndroid: false
      disableIOS: true

  expo-android-e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build-rn
    timeout-minutes: 60
    env:
      JAZZ_E2E_APP_ID: 6316f08d-d5d1-41df-82b8-8c16aa26db84
      JAZZ_E2E_ADMIN_SECRET: d0a2f110-36a8-45b9-8632-ecbc09128e2a
      JAZZ_E2E_SERVER_PORT: "1625"
      COREPACK_HOME: /home/runner/.local/share/corepack
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G

    steps:
      - uses: actions/checkout@v6

      - name: Setup Source Code
        uses: ./.github/actions/source-code/
  
      - name: Download React Native Android artifact
        uses: actions/download-artifact@v5
        with:
          name: jazz-rn-android
          path: crates/jazz-rn

      - name: List React Native Android artifacts
        run: |
          ls -R crates/jazz-rn/android/src/main/jniLibs
        shell: bash

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Pnpm Build
        run: pnpm build
      
      - name: Todo Client Local First Expo App Pre Build
        working-directory: ./examples/todo-client-localfirst-expo
        run: |
          pnpm expo prebuild --clean

      - name: Validate required CI secrets
        env:
          MAESTRO_KEY: ${{ secrets.MAESTRO_KEY }}
          MAESTRO_PROJECT_ID: ${{ secrets.MAESTRO_PROJECT_ID }}
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
        run: scripts/expo-android-maestro-e2e.sh validate-secrets

      - name: Install Vercel Sandbox CLI
        run: |
          set -euo pipefail
          npm install -g sandbox
          sandbox --version


      - name: Start Vercel Sandbox and run jazz-tools server
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: scripts/expo-android-maestro-e2e.sh start-sandbox-server

      - name: Build Expo Android release APK
        env:
          EXPO_PUBLIC_JAZZ_APP_ID: ${{ env.JAZZ_E2E_APP_ID }}
          EXPO_PUBLIC_JAZZ_ADMIN_SECRET: ${{ env.JAZZ_E2E_ADMIN_SECRET }}
          EXPO_PUBLIC_JAZZ_SERVER_URL: ${{ env.SERVER_PUBLIC_URL }}
        run: scripts/expo-android-maestro-e2e.sh build-expo-apk

      - name: Ensure APK exists
        run: |
          set -euo pipefail
          test -f examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk

      - name: Run Maestro Cloud flows
        id: maestro
        uses: mobile-dev-inc/action-maestro-cloud@v2
        with:
          api-key: ${{ secrets.MAESTRO_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk
          workspace: .maestro

      - name: Fetch sandbox server log
        if: always()
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: scripts/expo-android-maestro-e2e.sh fetch-sandbox-server-log

      - name: Verify server communication evidence
        if: always() && (steps.maestro.outcome == 'success' || steps.maestro.outcome == 'failure')
        run: scripts/expo-android-maestro-e2e.sh verify-server-evidence

      - name: Stop Vercel Sandbox
        if: always()
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: scripts/expo-android-maestro-e2e.sh stop-sandbox

      - name: Upload server and sandbox logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-android-maestro-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            server.log
            vercel-sandbox.log
          if-no-files-found: warn
