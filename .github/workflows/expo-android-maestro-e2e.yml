name: Expo Android E2E (Maestro Cloud)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - changeset-release/*
  pull_request:
    branches: [main]
    paths:
      - crates/jazz-rn/**
      - packages/jazz-tools/src/react-native/**
      - .github/workflows/expo-android-maestro-e2e.yml

concurrency:
  group: expo-android-maestro-e2e-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-rn:
    name: Build jazz-rn (Android) artifacts
    uses: ./.github/workflows/rn-build-reusable.yml
    with:
      concurrency: e2e-rn-test
      disableAndroid: false
      disableIOS: true

  build-jazz-tools-sandbox:
    name: Build jazz-tools sandbox binary (${{ matrix.target }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    env:
      CARGO_ZIGBUILD_CACHE_DIR: /tmp/cargo-zigbuild-cache
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
          cache-key: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build sandbox binary
        run: |
          mkdir -p .artifacts/jazz-tools
          cargo zigbuild --release -p jazz-tools --bin jazz-tools --features cli --target "${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/jazz-tools" ".artifacts/jazz-tools/jazz-tools-${{ matrix.target }}"

      - name: Upload sandbox binary
        uses: actions/upload-artifact@v4
        with:
          name: jazz-tools-sandbox-${{ matrix.target }}
          if-no-files-found: error
          path: .artifacts/jazz-tools/jazz-tools-${{ matrix.target }}

  expo-android-e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - build-rn
      - build-jazz-tools-sandbox
    timeout-minutes: 60
    env:
      JAZZ_E2E_APP_ID: 6316f08d-d5d1-41df-82b8-8c16aa26db84
      JAZZ_E2E_ADMIN_SECRET: d0a2f110-36a8-45b9-8632-ecbc09128e2a
      JAZZ_E2E_SERVER_PORT: "1625"
      COREPACK_HOME: /home/runner/.local/share/corepack

    steps:
      - uses: actions/checkout@v6

      - name: Setup Source Code
        uses: ./.github/actions/source-code/

      - name: Download React Native Android artifact
        uses: actions/download-artifact@v5
        with:
          name: jazz-rn-android
          path: crates/jazz-rn

      - name: Download jazz-tools sandbox binaries
        uses: actions/download-artifact@v5
        with:
          pattern: jazz-tools-sandbox-*
          path: .artifacts/jazz-tools
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build Expo E2E JS dependencies
        run: |
          pnpm --filter jazz-wasm run build
          pnpm --filter jazz-tools run build:runtime

      - name: Validate Expo app schema and types
        working-directory: examples/todo-client-localfirst-expo
        run: |
          pnpm exec jazz-tools validate
          pnpm exec tsc --noEmit

      - name: Expo prebuild (Android)
        run: pnpm --filter todo-client-localfirst-expo run verify:expo:android

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            examples/todo-client-localfirst-expo/android/**/*.gradle*
            examples/todo-client-localfirst-expo/android/gradle/wrapper/gradle-wrapper.properties
            crates/jazz-rn/android/**/*.gradle*
            crates/jazz-rn/android/gradle.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "::error::ANDROID_SDK_ROOT and ANDROID_HOME are both unset"
            exit 1
          fi

          export ANDROID_SDK_ROOT="$SDK_ROOT"

          rm -rf "${SDK_ROOT}/ndk/27.1.12297006"
          rm -rf "${SDK_ROOT}/.temp"
          rm -rf "${HOME}/.android/cache"

          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager --install "ndk;27.1.12297006"

      - name: Install Vercel Sandbox CLI
        run: npm install -g sandbox

      - name: Create sandbox and start jazz-tools server
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID || 'team_xiRKInFi7lBd1gTqyAGuzmkC' }}
        run: |
          set -euo pipefail

          SCOPE=()
          if [ -n "${VERCEL_TEAM_ID:-}" ]; then SCOPE=(--scope "$VERCEL_TEAM_ID"); fi
          COMMON=(--token "$VERCEL_SANDBOXES_TOKEN" --project "$VERCEL_SANDBOXES_PROJECT_ID" "${SCOPE[@]}")

          : > vercel-sandbox.log
          CREATE_OUT=""
          SANDBOX_ID=""
          SERVER_PUBLIC_URL=""

          for attempt in 1 2 3; do
            echo "Creating sandbox (attempt ${attempt}/3)..." | tee -a vercel-sandbox.log

            set +e
            CREATE_OUT="$(sandbox create "${COMMON[@]}" --runtime node22 --timeout 60m --publish-port "$JAZZ_E2E_SERVER_PORT" 2>&1)"
            CREATE_STATUS=$?
            set -e

            printf '%s\n' "$CREATE_OUT" | tee -a vercel-sandbox.log

            SANDBOX_ID="$(echo "$CREATE_OUT" | grep -Eo 'sbx_[[:alnum:]]+|sb_[[:alnum:]]+' | head -n1 || true)"
            SERVER_PUBLIC_URL="$(echo "$CREATE_OUT" | grep -Eo 'https://[^[:space:]]+' | head -n1 || true)"

            if [ "$CREATE_STATUS" -eq 0 ] && [ -n "$SANDBOX_ID" ] && [ -n "$SERVER_PUBLIC_URL" ]; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              if [ "$CREATE_STATUS" -ne 0 ]; then
                echo "::error::sandbox create failed after ${attempt} attempts (exit ${CREATE_STATUS})"
                exit "$CREATE_STATUS"
              fi
              break
            fi

            echo "::warning::sandbox create attempt ${attempt} failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done

          if [ -z "$SANDBOX_ID" ]; then echo "::error::Could not parse sandbox ID"; exit 1; fi
          echo "SANDBOX_ID=$SANDBOX_ID" >> "$GITHUB_ENV"

          if [ -z "$SERVER_PUBLIC_URL" ]; then echo "::error::Could not parse sandbox public URL"; exit 1; fi
          echo "SERVER_PUBLIC_URL=$SERVER_PUBLIC_URL" >> "$GITHUB_ENV"

          ARCH="$(sandbox exec "${COMMON[@]}" "$SANDBOX_ID" uname -m | tr -d '\r' | tail -n1)"
          case "$ARCH" in
            x86_64|amd64) BINARY=".artifacts/jazz-tools/jazz-tools-x86_64-unknown-linux-musl" ;;
            aarch64|arm64) BINARY=".artifacts/jazz-tools/jazz-tools-aarch64-unknown-linux-musl" ;;
            *) echo "::error::Unsupported sandbox arch: $ARCH"; exit 1 ;;
          esac
          if [ ! -f "$BINARY" ]; then
            echo "::error::Missing prebuilt jazz-tools binary for sandbox arch: $ARCH"
            exit 1
          fi
          sandbox copy "${COMMON[@]}" "$BINARY" "$SANDBOX_ID:/tmp/jazz-tools"

          sandbox exec "${COMMON[@]}" "$SANDBOX_ID" chmod +x /tmp/jazz-tools

          sandbox exec "${COMMON[@]}" "$SANDBOX_ID" sh -c \
            "(/tmp/jazz-tools server '$JAZZ_E2E_APP_ID' --admin-secret '$JAZZ_E2E_ADMIN_SECRET' --port '$JAZZ_E2E_SERVER_PORT' </dev/null >/tmp/server.log 2>&1 &)"

          sleep 5

          sandbox exec "${COMMON[@]}" "$SANDBOX_ID" tail -n 200 /tmp/server.log | tee -a vercel-sandbox.log

      - name: Verify Server URL
        run: |
          echo "Verifying server URL: ${SERVER_PUBLIC_URL}"
          HEALTH_BODY="$(curl --silent --show-error --fail --retry 20 --retry-delay 1 "${SERVER_PUBLIC_URL}/health")"
          echo "$HEALTH_BODY"
          echo "$HEALTH_BODY" | grep -F '"status":"healthy"'

      - name: Push schema and permissions to sandbox server
        # In dev, the Expo Metro plugin (`withJazz` in metro.config.mjs) publishes
        # schema.ts and permissions.ts on every Metro start. The release APK never
        # runs Metro, so we have to publish them out-of-band before the app can
        # connect — otherwise the server has no schema and every client request
        # fails.
        working-directory: examples/todo-client-localfirst-expo
        env:
          JAZZ_APP_ID: ${{ env.JAZZ_E2E_APP_ID }}
          JAZZ_SERVER_URL: ${{ env.SERVER_PUBLIC_URL }}
          JAZZ_ADMIN_SECRET: ${{ env.JAZZ_E2E_ADMIN_SECRET }}
        run: pnpm exec jazz-tools deploy "$JAZZ_APP_ID"

      - name: Build release APK
        working-directory: examples/todo-client-localfirst-expo/android
        env:
          EXPO_PUBLIC_JAZZ_APP_ID: ${{ env.JAZZ_E2E_APP_ID }}
          EXPO_PUBLIC_JAZZ_ADMIN_SECRET: ${{ env.JAZZ_E2E_ADMIN_SECRET }}
          EXPO_PUBLIC_JAZZ_SERVER_URL: ${{ env.SERVER_PUBLIC_URL }}
        run: chmod +x gradlew && ./gradlew :app:assembleRelease --build-cache --no-daemon

      - name: Run Maestro Cloud flows
        id: maestro
        uses: mobile-dev-inc/action-maestro-cloud@v2
        with:
          api-key: ${{ secrets.MAESTRO_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk
          workspace: dev/maestro/flows

      - name: Verify server evidence
        if: always() && (steps.maestro.outcome == 'success' || steps.maestro.outcome == 'failure')
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID || 'team_xiRKInFi7lBd1gTqyAGuzmkC' }}
        run: |
          set -euo pipefail
          SCOPE=()
          if [ -n "${VERCEL_TEAM_ID:-}" ]; then SCOPE=(--scope "$VERCEL_TEAM_ID"); fi
          sandbox copy --token "$VERCEL_SANDBOXES_TOKEN" --project "$VERCEL_SANDBOXES_PROJECT_ID" "${SCOPE[@]}" \
            "$SANDBOX_ID:/tmp/server.log" server.log || true

          cat server.log

      - name: Stop sandbox
        if: always()
        env:
          VERCEL_SANDBOXES_TOKEN: ${{ secrets.VERCEL_SANDBOXES_TOKEN }}
          VERCEL_SANDBOXES_PROJECT_ID: ${{ secrets.VERCEL_SANDBOXES_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID || 'team_xiRKInFi7lBd1gTqyAGuzmkC' }}
        run: |
          if [ -z "${SANDBOX_ID:-}" ]; then exit 0; fi
          SCOPE=()
          if [ -n "${VERCEL_TEAM_ID:-}" ]; then SCOPE=(--scope "$VERCEL_TEAM_ID"); fi
          sandbox stop --token "$VERCEL_SANDBOXES_TOKEN" --project "$VERCEL_SANDBOXES_PROJECT_ID" "${SCOPE[@]}" "$SANDBOX_ID" || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-android-maestro-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            server.log
            vercel-sandbox.log
          if-no-files-found: warn
