name: Expo Android E2E (Maestro Cloud)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - packages/jazz-tools/**
      - examples/todo-client-localfirst-expo/**
      - Cargo.toml
      - Cargo.lock
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/expo-android-maestro-e2e.yml

concurrency:
  group: expo-android-maestro-e2e-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  expo-android-e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    env:
      JAZZ_E2E_APP_ID: 6316f08d-d5d1-41df-82b8-8c16aa26db84
      JAZZ_E2E_ADMIN_SECRET: d0a2f110-36a8-45b9-8632-ecbc09128e2a
      JAZZ_E2E_SERVER_PORT: "1625"
      COREPACK_HOME: /home/runner/.local/share/corepack
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: pnpm

      - name: Enable Corepack and pin pnpm
        run: |
          set -euo pipefail
          mkdir -p "${COREPACK_HOME}"
          corepack enable
          corepack prepare pnpm@10.14.0 --activate
          node --version
          pnpm --version

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown, aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Validate Maestro Cloud secrets
        env:
          MAESTRO_KEY: ${{ secrets.MAESTRO_KEY }}
          MAESTRO_PROJECT_ID: ${{ secrets.MAESTRO_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${MAESTRO_KEY}" ]; then
            echo "::error::Missing MAESTRO_KEY repository secret."
            exit 1
          fi
          if [ -z "${MAESTRO_PROJECT_ID}" ]; then
            echo "::error::Missing MAESTRO_PROJECT_ID repository secret."
            exit 1
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - name: Mount sccache sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: sccache-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/sccache

      - name: Build all workspace packages
        run: |
          set -euo pipefail
          sccache --show-stats || true

          # `build:all` includes jazz-rn iOS native artifacts.
          # This workflow runs on Linux, so we run the Linux-equivalent set:
          # 1) explicit jazz-rn Android native payload build
          # 2) workspace build (same as CI)
          pnpm --filter jazz-rn build:rn:android
          pnpm build

          sccache --show-stats || true

      - name: Build jazz-tools CLI
        run: |
          set -euo pipefail
          sccache --show-stats || true
          cargo build -p jazz-tools --bin jazz-tools --features cli
          sccache --show-stats || true

      - name: Install cloudflared
        run: |
          set -euo pipefail

          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) CLOUDFLARED_ASSET="cloudflared-linux-amd64" ;;
            aarch64|arm64) CLOUDFLARED_ASSET="cloudflared-linux-arm64" ;;
            *)
              echo "::error::Unsupported architecture for cloudflared: ${ARCH}"
              exit 1
              ;;
          esac

          mkdir -p "${HOME}/.local/bin"
          curl -fsSL \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/${CLOUDFLARED_ASSET}" \
            -o "${HOME}/.local/bin/cloudflared"
          chmod +x "${HOME}/.local/bin/cloudflared"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

          "${HOME}/.local/bin/cloudflared" --version

      - name: Generate Expo Android project (prebuild)
        run: |
          set -euo pipefail
          pnpm --filter todo-client-localfirst-expo verify:expo:android
          test -f examples/todo-client-localfirst-expo/android/gradlew

      - name: Start jazz-tools server
        run: |
          set -euo pipefail
          rm -f server.log

          nohup target/debug/jazz-tools server "${JAZZ_E2E_APP_ID}" \
            --admin-secret "${JAZZ_E2E_ADMIN_SECRET}" \
            --port "${JAZZ_E2E_SERVER_PORT}" \
            > server.log 2>&1 &

          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> "${GITHUB_ENV}"

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "http://127.0.0.1:${JAZZ_E2E_SERVER_PORT}/health" > /dev/null; then
              echo "Jazz server is healthy."
              exit 0
            fi

            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              echo "::error::jazz-tools server exited before becoming healthy."
              tail -n 200 server.log || true
              exit 1
            fi

            sleep 1
          done

          echo "::error::Timed out waiting for jazz-tools /health endpoint."
          tail -n 200 server.log || true
          exit 1

      - name: Start cloudflared and wait for public URL
        run: |
          set -euo pipefail
          rm -f cloudflared.log

          nohup cloudflared tunnel --url "http://127.0.0.1:${JAZZ_E2E_SERVER_PORT}" --no-autoupdate \
            > cloudflared.log 2>&1 &

          CLOUDFLARED_PID=$!
          echo "CLOUDFLARED_PID=${CLOUDFLARED_PID}" >> "${GITHUB_ENV}"

          SERVER_PUBLIC_URL=""
          for attempt in $(seq 1 90); do
            SERVER_PUBLIC_URL="$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' cloudflared.log | head -n 1 || true)"
            if [ -n "${SERVER_PUBLIC_URL}" ]; then
              break
            fi

            if ! kill -0 "${CLOUDFLARED_PID}" 2>/dev/null; then
              echo "::error::cloudflared exited before publishing a public URL."
              tail -n 200 cloudflared.log || true
              exit 1
            fi

            sleep 1
          done

          if [ -z "${SERVER_PUBLIC_URL}" ]; then
            echo "::error::Timed out waiting for cloudflared URL in cloudflared.log."
            tail -n 200 cloudflared.log || true
            exit 1
          fi

          TUNNEL_HOST="${SERVER_PUBLIC_URL#https://}"
          TUNNEL_READY=0
          for attempt in $(seq 1 180); do
            if ! kill -0 "${CLOUDFLARED_PID}" 2>/dev/null; then
              echo "::error::cloudflared exited before tunnel became reachable."
              tail -n 200 cloudflared.log || true
              exit 1
            fi

            # Quick tunnels can take time to propagate in DNS; skip health checks
            # until the hostname resolves from this runner.
            if getent hosts "${TUNNEL_HOST}" >/dev/null 2>&1; then
              if curl --fail --silent --show-error --max-time 5 "${SERVER_PUBLIC_URL}/health" > /dev/null; then
                TUNNEL_READY=1
                break
              fi
            fi

            sleep 1
          done

          echo "SERVER_PUBLIC_URL=${SERVER_PUBLIC_URL}" >> "${GITHUB_ENV}"
          if [ "${TUNNEL_READY}" -eq 1 ]; then
            echo "Resolved tunnel URL and verified /health: ${SERVER_PUBLIC_URL}"
            exit 0
          fi

          echo "::warning::Tunnel URL resolved but could not verify /health from this runner within timeout (likely DNS propagation). Continuing with discovered URL for Maestro Cloud."
          tail -n 100 cloudflared.log || true

      - name: Build Expo Android release APK
        env:
          EXPO_PUBLIC_JAZZ_APP_ID: ${{ env.JAZZ_E2E_APP_ID }}
          EXPO_PUBLIC_JAZZ_ADMIN_SECRET: ${{ env.JAZZ_E2E_ADMIN_SECRET }}
          EXPO_PUBLIC_JAZZ_SERVER_URL: ${{ env.SERVER_PUBLIC_URL }}
        run: |
          set -euo pipefail
          APP_DIR="examples/todo-client-localfirst-expo"
          ANDROID_DIR="${APP_DIR}/android"

          if [ -z "${EXPO_PUBLIC_JAZZ_SERVER_URL:-}" ]; then
            echo "::error::EXPO_PUBLIC_JAZZ_SERVER_URL is empty before APK build."
            exit 1
          fi
          if ! printf '%s' "${EXPO_PUBLIC_JAZZ_SERVER_URL}" | grep -Eq '^https://[a-z0-9-]+\.trycloudflare\.com$'; then
            echo "::error::EXPO_PUBLIC_JAZZ_SERVER_URL has unexpected format: ${EXPO_PUBLIC_JAZZ_SERVER_URL}"
            exit 1
          fi

          # The Android project is generated by Expo prebuild and is not tracked.
          # If another prior step cleaned it, regenerate right before Gradle.
          if [ ! -f "${ANDROID_DIR}/gradlew" ]; then
            echo "::warning::Missing ${ANDROID_DIR}/gradlew before assembleRelease; regenerating Android project."
            pnpm --filter todo-client-localfirst-expo verify:expo:android
          fi

          if [ ! -f "${ANDROID_DIR}/gradlew" ]; then
            echo "::error::Android project was not generated at ${ANDROID_DIR}."
            exit 1
          fi

          chmod +x "${ANDROID_DIR}/gradlew"
          (
            cd "${ANDROID_DIR}"
            ./gradlew :app:assembleRelease --no-daemon
          )

      - name: Ensure APK exists
        run: |
          set -euo pipefail
          test -f examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk

      - name: Run Maestro Cloud flows
        id: maestro
        uses: mobile-dev-inc/action-maestro-cloud@v2
        with:
          api-key: ${{ secrets.MAESTRO_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: examples/todo-client-localfirst-expo/android/app/build/outputs/apk/release/app-release.apk
          workspace: .maestro

      - name: Verify server communication evidence
        run: |
          set -euo pipefail

          SYNC_COUNT="$(grep -c 'sync request' server.log || true)"
          EVENTS_COUNT="$(grep -c 'events stream connecting' server.log || true)"

          echo "sync request count: ${SYNC_COUNT}"
          echo "events stream connecting count: ${EVENTS_COUNT}"

          if [ "${SYNC_COUNT}" -eq 0 ]; then
            echo "::error::No 'sync request' lines found in server.log."
            exit 1
          fi

          if [ "${EVENTS_COUNT}" -eq 0 ]; then
            echo "::error::No 'events stream connecting' lines found in server.log."
            exit 1
          fi

      - name: Stop background services
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARED_PID:-}" ] && kill -0 "${CLOUDFLARED_PID}" 2>/dev/null; then
            kill "${CLOUDFLARED_PID}" || true
          fi
          if [ -n "${SERVER_PID:-}" ] && kill -0 "${SERVER_PID}" 2>/dev/null; then
            kill "${SERVER_PID}" || true
          fi

      - name: Upload server and tunnel logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-android-maestro-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            server.log
            cloudflared.log
          if-no-files-found: warn
