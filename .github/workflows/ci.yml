name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  # For pushes, this lets concurrent runs happen, so each push gets a result.
  # But for other events (e.g. PRs), we can cancel the previous runs.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: pnpm install --frozen-lockfile
      - name: Ensure wasm-pack is available
        run: |
          if ! command -v wasm-pack >/dev/null; then
            WASM_PACK_VERSION=0.14.0
            WASM_PACK_TARGET=x86_64-unknown-linux-musl
            WASM_PACK_TAR="wasm-pack-v${WASM_PACK_VERSION}-${WASM_PACK_TARGET}.tar.gz"
            WASM_PACK_URL="https://github.com/drager/wasm-pack/releases/download/v${WASM_PACK_VERSION}/${WASM_PACK_TAR}"
            TMP_DIR="$(mktemp -d)"
            mkdir -p "${CARGO_HOME}/bin"
            curl -sSfL "${WASM_PACK_URL}" -o "${TMP_DIR}/${WASM_PACK_TAR}"
            tar -xzf "${TMP_DIR}/${WASM_PACK_TAR}" -C "${TMP_DIR}"
            install -m 0755 "${TMP_DIR}/wasm-pack-v${WASM_PACK_VERSION}-${WASM_PACK_TARGET}/wasm-pack" "${CARGO_HOME}/bin/wasm-pack"
            rm -rf "${TMP_DIR}"
          fi
          wasm-pack --version

      - run: pnpm format:check
      - run: pnpm oxlint .
      - run: pnpm build
      - run: cargo clippy --workspace -- -D warnings
      - run: pnpm test
