  js_build_test:
    name: js_build_test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [rust_core_build, wasm, napi_linux]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: rust-core-debug-binaries
          path: dist

      - run: |
          mkdir -p target/debug
          tar -xzf dist/rust-core-debug-binaries.tgz -C target/debug

      - uses: actions/download-artifact@v4
        with:
          name: jazz-wasm-pkg
          path: crates/jazz-wasm

      - uses: actions/download-artifact@v4
        with:
          name: jazz-napi-linux-x64-gnu
          path: crates/jazz-napi

      - name: Mount Playwright sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: playwright-browsers-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/ms-playwright

      - run: pnpm exec playwright install chromium

      - run: pnpm -r --if-present --filter "./packages/**" --filter "./examples/**" --filter "./examples/docs/**" --filter "./docs" run build
      - run: pnpm -r --if-present --filter "./packages/**" --filter "./examples/**" --filter "./examples/docs/**" --filter "./docs" run test

      - uses: actions/upload-artifact@v4
        with:
          name: jazz-tools-dist
          path: packages/jazz-tools/dist
          if-no-files-found: error

  inspector_e2e:
    name: inspector_e2e
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [js_build_test]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: rust-core-debug-binaries
          path: dist

      - run: |
          mkdir -p target/debug
          tar -xzf dist/rust-core-debug-binaries.tgz -C target/debug

      - uses: actions/download-artifact@v4
        with:
          name: jazz-wasm-pkg
          path: crates/jazz-wasm

      - uses: actions/download-artifact@v4
        with:
          name: jazz-napi-linux-x64-gnu
          path: crates/jazz-napi

      - uses: actions/download-artifact@v4
        with:
          name: jazz-tools-dist
          path: packages/jazz-tools

      - name: Mount Playwright sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: playwright-browsers-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/ms-playwright

      - run: pnpm exec playwright install chromium
      - run: pnpm --filter inspector test:browser

  wequencer_e2e:
    name: wequencer_e2e
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [js_build_test]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: rust-core-debug-binaries
          path: dist

      - run: |
          mkdir -p target/debug
          tar -xzf dist/rust-core-debug-binaries.tgz -C target/debug

      - uses: actions/download-artifact@v4
        with:
          name: jazz-wasm-pkg
          path: crates/jazz-wasm

      - uses: actions/download-artifact@v4
        with:
          name: jazz-napi-linux-x64-gnu
          path: crates/jazz-napi

      - uses: actions/download-artifact@v4
        with:
          name: jazz-tools-dist
          path: packages/jazz-tools

      - name: Mount Playwright sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: playwright-browsers-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/ms-playwright

      - run: pnpm exec playwright install chromium
      - run: pnpm --filter wequencer test:e2e
