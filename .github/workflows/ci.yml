name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # For pushes, this lets concurrent runs happen, so each push gets a result.
  # But for other events (e.g. PRs), we can cancel the previous runs.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    env:
      JAZZ_SKIP_RN_DEPS: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: rocksdb-v1

      - uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Mount sccache sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: sccache-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/sccache

      - run: pnpm format:check
      - run: pnpm lint
      - run: cargo clippy --workspace -- -D warnings

  test-rust:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      JAZZ_SKIP_RN_DEPS: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: rocksdb-v1

      - uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Mount sccache sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: sccache-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/sccache

      - run: cargo test --workspace --lib --bins --tests --exclude jazz-rn --features test

  test-ts:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      JAZZ_NAPI_RELEASE: "0"
      JAZZ_SKIP_RN_DEPS: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 8G

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: rocksdb-v1

      - uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Mount sccache sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: sccache-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/sccache

      - name: Mount Turbo sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: turbo-cache-${{ github.repository_id }}-${{ runner.os }}-v1
          path: ${{ github.workspace }}/.turbo/cache

      - run: pnpm build:ci
      - name: Mount Playwright sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: playwright-browsers-${{ github.repository_id }}-${{ runner.os }}-v1
          path: /home/runner/.cache/ms-playwright
      - run: pnpm exec playwright install chromium
      - run: pnpm test --filter=!moon-lander-react --filter=!@jazz/rust --filter=!jazz-rn --concurrency=2
      - run: pnpm --filter jazz-tools test:browser
