name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --all --manifest-path crates/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --manifest-path crates/Cargo.toml -- -D warnings

      - name: Run Biome
        run: pnpm lint

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/groove
            crates/groove-server
            crates/groove-wasm

      - name: Run Rust tests (all features)
        run: cargo test --all-features --workspace --exclude groove-wasm --manifest-path crates/Cargo.toml

  ts-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/groove-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM
        run: cd crates/groove-wasm && wasm-pack build --target web

      - name: Build TypeScript packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            crates/groove-wasm/pkg
          retention-days: 1

  ts-lib-tests:
    name: TypeScript Lib Tests
    runs-on: ubuntu-latest
    needs: ts-build
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install Playwright browsers
        run: pnpm --filter="@jazz/client" exec playwright install --with-deps chromium

      - name: Run lib tests
        run: pnpm test --filter="@jazz/*"

  sync-demo-tests:
    name: Sync Demo E2E Tests
    runs-on: ubuntu-latest
    needs: ts-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/groove-server

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Build groove-server
        run: cargo build --release -p groove-server --manifest-path crates/Cargo.toml

      - name: Start groove-server
        run: |
          ./crates/target/release/groove-server &
          sleep 2

      - name: Install Playwright browsers
        run: cd examples/sync-demo && pnpm exec playwright install --with-deps

      - name: Run sync-demo E2E tests
        run: cd examples/sync-demo && pnpm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sync-demo-playwright-report
          path: examples/sync-demo/playwright-report
          retention-days: 7

  demo-app-tests:
    name: Demo App Tests
    runs-on: ubuntu-latest
    needs: ts-lib-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Generate schema
        run: cd examples/demo-app && pnpm generate

      - name: Install Playwright browsers
        run: cd examples/demo-app && pnpm exec playwright install --with-deps chromium

      - name: Run unit tests
        run: cd examples/demo-app && pnpm test

      - name: Run E2E tests
        run: cd examples/demo-app && pnpm test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: demo-app-playwright-report
          path: examples/demo-app/playwright-report
          retention-days: 7

  auth-betterauth-tests:
    name: Auth BetterAuth E2E Tests
    runs-on: ubuntu-latest
    needs: ts-build
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Rebuild native modules
        run: cd examples/auth-betterauth && npm rebuild better-sqlite3

      - name: Run BetterAuth migrations
        run: cd examples/auth-betterauth && npx @better-auth/cli migrate --config server/auth-server.ts -y

      - name: Install Playwright browsers
        run: cd examples/auth-betterauth && pnpm exec playwright install --with-deps chromium

      - name: Run BetterAuth E2E tests
        run: cd examples/auth-betterauth && pnpm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: auth-betterauth-playwright-report
          path: examples/auth-betterauth/playwright-report
          retention-days: 7

  auth-workos-tests:
    name: Auth WorkOS E2E Tests
    runs-on: ubuntu-latest
    needs: ts-build
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install Playwright browsers
        run: cd examples/auth-workos && pnpm exec playwright install --with-deps chromium

      - name: Run WorkOS E2E tests
        env:
          WORKOS_TEST_EMAIL: ${{ secrets.WORKOS_TEST_EMAIL }}
          WORKOS_TEST_PASSWORD: ${{ secrets.WORKOS_TEST_PASSWORD }}
        run: cd examples/auth-workos && pnpm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: auth-workos-playwright-report
          path: examples/auth-workos/playwright-report
          retention-days: 7
