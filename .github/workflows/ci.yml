name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # For pushes, this lets concurrent runs happen, so each push gets a result.
  # But for other events (e.g. PRs), we can cancel the previous runs.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

env:
  CACHE_SCOPE_REPOSITORY_ID: ${{ github.event.pull_request.head.repo.id || github.repository_id }}

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build
        with:
          rust-targets: wasm32-unknown-unknown
          rust-components: clippy,rustfmt
          sccache: "true"

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - run: pnpm format:check
      - run: pnpm lint
      - run: cargo clippy --workspace -- -D warnings

  test-rust:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build
        with:
          rust-targets: wasm32-unknown-unknown
          rust-components: clippy,rustfmt
          sccache: "true"

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - run: cargo test --workspace --lib --bins --tests --features test

  test-ts:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      # jazz-napi's .node carries a large initial-exec TLS segment; without a
      # bigger glibc static-TLS reserve, dlopen fails with "cannot allocate
      # memory in static TLS block" (see dev/CI_NOTES.md 2026-07-19).
      GLIBC_TUNABLES: glibc.rtld.optional_static_tls=4194304
    # JAZZ_NAPI_RELEASE=0 (debug builds) removed 2026-07-19: debug-profile
    # jazz-napi .node files fail dlopen on the Linux runners deterministically
    # (root cause TBD; see dev/CI_NOTES.md). Release builds load fine.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build
        with:
          rust-targets: wasm32-unknown-unknown
          rust-components: clippy,rustfmt
          sccache: "true"

      - name: Install Rust prerequisites
        run: pnpm run ensure:rust-toolchain

      - name: Mount Turbo sticky disk
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88 # v1
        with:
          key: turbo-cache-${{ env.CACHE_SCOPE_REPOSITORY_ID }}-${{ runner.os }}-v1
          path: ${{ github.workspace }}/.turbo/cache

      - run: pnpm build:ci
      # Turbo cache hits have reproducibly restored jazz-napi without a loadable
      # .node binding (CI rounds 9/9-rerun, 2026-07-19); verify and force-rebuild
      # if needed. See dev/CI_NOTES.md.
      # Cached jazz-napi archives have restored .node files that fail dlopen
      # (likely sticky-disk corruption across concurrent runs); build the
      # binding fresh and verify it loads. Tests then run with --only so no
      # turbo build dependency can restore a cached artifact over it.
      - name: Rebuild and verify jazz-napi native binding
        run: |
          pnpm turbo run build --filter=jazz-napi --force
          node -e "require('./crates/jazz-napi')"
      - name: Mount Playwright sticky disk
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88 # v1
        with:
          key: playwright-browsers-${{ env.CACHE_SCOPE_REPOSITORY_ID }}-${{ runner.os }}-v1
          path: /home/runner/.cache/ms-playwright
      - run: pnpm exec playwright install chromium
      - run: pnpm test --filter=!moon-lander-react --filter=!@jazz/rust --filter=!auth-simple-chat --filter=!auth-workos-chat --filter=!auth-betterauth-chat --filter=!chat-react --filter=!world-tour --filter=!todo-server-ts --filter=!todo-server-ts-docs --filter=!todo-client-localfirst-ts --filter=!todo-client-localfirst-ts-docs --filter=!todo-client-localfirst-solid --filter=!todo-client-localfirst-svelte --filter=!todo-client-localfirst-vue --filter=!todo-client-localfirst-react --filter=!todo-client-localfirst-react-docs --filter=!create-jazz --concurrency=2 --only
      - run: pnpm --filter jazz-tools test:browser
