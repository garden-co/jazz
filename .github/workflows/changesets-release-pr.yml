name: Changesets Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changesets-release-pr
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Guard alpha prerelease mode
        run: |
          test -f .changeset/pre.json
          node -e 'const fs=require("fs");const pre=JSON.parse(fs.readFileSync(".changeset/pre.json","utf8"));if(pre.mode!=="pre"||pre.tag!=="alpha"){throw new Error(`Expected .changeset/pre.json mode=pre tag=alpha, got mode=${pre.mode} tag=${pre.tag}`);}console.log("Changesets prerelease mode: alpha");'

      - name: Create or update release PR
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          title: "Version Packages (alpha)"
          commit: "Version Packages (alpha)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
