name: Publish jazz-tools alpha

on:
  push:
    branches:
      - main
    paths:
      - packages/jazz-tools/package.json
      - crates/jazz-wasm/package.json
      - crates/jazz-napi/package.json
      - crates/jazz-rn/package.json
      - packages/jazz-tools/CHANGELOG.md
      - crates/jazz-wasm/CHANGELOG.md
      - crates/jazz-napi/CHANGELOG.md
      - crates/jazz-rn/CHANGELOG.md
  workflow_call:
    inputs:
      mode:
        description: "Execution mode: publish (real release) or dry-run (build + verify only)."
        required: false
        type: string
        default: publish
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode."
        required: true
        type: choice
        default: publish
        options:
          - publish
          - dry-run
      version:
        description: "Optional exact manual version override (for example 2.0.0-alpha.6)."
        required: false
        type: string

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x64
            output: jazz-tools-linux-x64
          - target: aarch64-unknown-linux-musl
            arch: arm64
            output: jazz-tools-linux-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build CLI binary
        run: cargo zigbuild -p jazz-tools --bin jazz-tools --features cli --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/jazz-tools dist/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            output: jazz-tools-darwin-arm64
          - target: x86_64-apple-darwin
            arch: x64
            output: jazz-tools-darwin-x64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build CLI binary
        run: cargo build -p jazz-tools --bin jazz-tools --features cli --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/jazz-tools dist/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: x86_64-pc-windows-msvc

      - name: Build CLI binary
        run: cargo build -p jazz-tools --bin jazz-tools --features cli --release --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/jazz-tools.exe dist/jazz-tools-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: jazz-tools-windows-x64
          path: dist/jazz-tools-windows-x64.exe

  build-napi:
    name: Build jazz-napi (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - name: Build jazz-napi binding
        run: pnpm --filter jazz-napi exec napi build --platform --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: jazz-napi-binding-${{ matrix.platform }}
          path: crates/jazz-napi/jazz-napi.${{ matrix.platform }}.node
          if-no-files-found: error

  publish-npm:
    name: Publish npm alpha
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-napi]
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      RELEASE_MODE: ${{ inputs.mode || github.event.inputs.mode || 'publish' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: jazz-napi-binding-*
          path: crates/jazz-napi/artifacts
          merge-multiple: true

      - name: Show release mode
        run: |
          case "${RELEASE_MODE}" in
            publish|dry-run) ;;
            *)
              echo "Unsupported RELEASE_MODE='${RELEASE_MODE}'"
              exit 1
              ;;
          esac
          echo "Release mode: ${RELEASE_MODE}"

      - name: Build jazz-wasm npm package
        run: pnpm --filter jazz-wasm build

      - name: Verify jazz-wasm publish artifacts
        run: |
          test -f crates/jazz-wasm/pkg/jazz_wasm_bg.wasm
          test -f crates/jazz-wasm/pkg/jazz_wasm.js
          test -f crates/jazz-wasm/pkg/jazz_wasm.d.ts

      - name: Stage jazz-napi platform package artifacts
        run: |
          cd crates/jazz-napi
          pnpm exec napi create-npm-dir -t .
          pnpm exec napi artifacts -d artifacts --dist npm
          node -e 'const fs=require("fs");for(const entry of fs.readdirSync("npm",{withFileTypes:true})){if(!entry.isDirectory())continue;const path=`npm/${entry.name}/package.json`;const p=JSON.parse(fs.readFileSync(path,"utf8"));p.name=`@garden-co/${p.name}`;fs.writeFileSync(path,`${JSON.stringify(p,null,2)}\n`);}'

      - name: Verify staged jazz-napi platform artifacts
        run: |
          test -f crates/jazz-napi/npm/linux-x64-gnu/jazz-napi.linux-x64-gnu.node
          test -f crates/jazz-napi/npm/win32-x64-msvc/jazz-napi.win32-x64-msvc.node
          test -f crates/jazz-napi/npm/darwin-x64/jazz-napi.darwin-x64.node
          test -f crates/jazz-napi/npm/darwin-arm64/jazz-napi.darwin-arm64.node

      - name: Build jazz-tools TypeScript package
        run: pnpm --filter jazz-tools build

      - name: Verify jazz-tools publish artifacts
        run: |
          test -f packages/jazz-tools/dist/index.js
          test -f packages/jazz-tools/dist/index.d.ts
          test -f packages/jazz-tools/dist/backend/index.js
          test -f packages/jazz-tools/dist/react/index.js
          test -f packages/jazz-tools/dist/permissions/index.js

      - name: Stage binaries into npm package
        run: |
          mkdir -p packages/jazz-tools/bin/native
          cp dist/jazz-tools-* packages/jazz-tools/bin/native/
          chmod +x packages/jazz-tools/bin/native/jazz-tools-darwin-* packages/jazz-tools/bin/native/jazz-tools-linux-* || true

      - name: Resolve lock-stepped npm package versions
        run: |
          if [ "${RELEASE_MODE}" = "dry-run" ]; then
            VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("packages/jazz-tools/package.json","utf8")).version')
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version || '' }}"
            if [ -n "${VERSION}" ]; then
              npm --prefix packages/jazz-tools version "${VERSION}" --no-git-tag-version
              npm --prefix crates/jazz-wasm version "${VERSION}" --no-git-tag-version
              npm --prefix crates/jazz-napi version "${VERSION}" --no-git-tag-version
              npm --prefix crates/jazz-rn version "${VERSION}" --no-git-tag-version
            else
              pnpm release:version
              VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("packages/jazz-tools/package.json","utf8")).version')
              npm --prefix crates/jazz-wasm version "${VERSION}" --no-git-tag-version
              npm --prefix crates/jazz-napi version "${VERSION}" --no-git-tag-version
              npm --prefix crates/jazz-rn version "${VERSION}" --no-git-tag-version
            fi
          else
            VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("packages/jazz-tools/package.json","utf8")).version')
          fi

          echo "Resolved publish version: ${VERSION}"

      - name: Sync jazz-napi platform package versions and optional deps
        run: |
          cd crates/jazz-napi
          pnpm exec napi version -p npm
          node -e 'const fs=require("fs");const rootPath="package.json";const pkg=JSON.parse(fs.readFileSync(rootPath,"utf8"));const deps=[];for(const entry of fs.readdirSync("npm",{withFileTypes:true})){if(!entry.isDirectory())continue;const child=JSON.parse(fs.readFileSync(`npm/${entry.name}/package.json`,"utf8"));deps.push([child.name,pkg.version]);}deps.sort((a,b)=>a[0].localeCompare(b[0]));pkg.optionalDependencies=Object.fromEntries(deps);fs.writeFileSync(rootPath,`${JSON.stringify(pkg,null,2)}\n`);'

      - name: Guard alpha-only lock-stepped publish versions
        run: |
          EXPECTED_VERSION="${{ github.event.inputs.version || '' }}" node -e 'const fs=require("fs");const path=require("path");const expected=process.env.EXPECTED_VERSION;const alphaVersion=/^2\.0\.0-alpha\.[0-9A-Za-z.-]+$/;const tools=JSON.parse(fs.readFileSync("packages/jazz-tools/package.json","utf8"));const wasm=JSON.parse(fs.readFileSync("crates/jazz-wasm/package.json","utf8"));const napi=JSON.parse(fs.readFileSync("crates/jazz-napi/package.json","utf8"));const rn=JSON.parse(fs.readFileSync("crates/jazz-rn/package.json","utf8"));if(expected){if(!alphaVersion.test(expected)){throw new Error(`Version override must match 2.0.0-alpha.*, got ${expected}`);}if(tools.version!==expected){throw new Error(`Version override mismatch: expected ${expected}, got ${tools.version}`);}}for(const pkg of [tools,wasm,napi,rn]){if(!alphaVersion.test(pkg.version)){throw new Error(`${pkg.name} version must match 2.0.0-alpha.*, got ${pkg.version}`);}const tag=pkg.publishConfig&&pkg.publishConfig.tag;if(tag&&tag!=="alpha"){throw new Error(`${pkg.name} publishConfig.tag must be alpha, got ${tag}`);}}if(!(tools.version===wasm.version&&tools.version===napi.version&&napi.version===rn.version)){throw new Error(`Versions diverged: tools=${tools.version} wasm=${wasm.version} napi=${napi.version} rn=${rn.version}`);}for(const [name,version] of Object.entries(napi.optionalDependencies||{})){if(version!==napi.version){throw new Error(`napi optional dep ${name} is ${version}, expected ${napi.version}`);}}for(const entry of fs.readdirSync("crates/jazz-napi/npm",{withFileTypes:true})){if(!entry.isDirectory())continue;const pkgPath=path.join("crates/jazz-napi/npm",entry.name,"package.json");const pkg=JSON.parse(fs.readFileSync(pkgPath,"utf8"));if(!alphaVersion.test(pkg.version)){throw new Error(`${pkg.name} version must match 2.0.0-alpha.*, got ${pkg.version}`);}if(pkg.version!==napi.version){throw new Error(`${pkg.name} version ${pkg.version} must match jazz-napi ${napi.version}`);}}console.log(`Alpha-only publish guard passed at ${tools.version}`);'

      - name: Verify packed jazz-wasm payload
        run: |
          TMP_DIR=$(mktemp -d)
          pnpm --filter jazz-wasm pack --pack-destination "${TMP_DIR}"
          TARBALL=$(ls "${TMP_DIR}"/jazz-wasm-*.tgz | head -n 1)
          tar -tf "${TARBALL}" | grep -q "package/pkg/jazz_wasm_bg.wasm"
          tar -tf "${TARBALL}" | grep -q "package/pkg/jazz_wasm.js"
          tar -tf "${TARBALL}" | grep -q "package/pkg/jazz_wasm.d.ts"

      - name: Verify packed jazz-napi payload
        run: |
          TMP_DIR=$(mktemp -d)
          pnpm --filter jazz-napi pack --pack-destination "${TMP_DIR}"
          TARBALL=$(ls "${TMP_DIR}"/jazz-napi-*.tgz | head -n 1)
          tar -tf "${TARBALL}" | grep -q "package/index.js"
          tar -tf "${TARBALL}" | grep -q "package/index.d.ts"
          tar -xOf "${TARBALL}" package/package.json | node -e 'let s="";process.stdin.on("data",(d)=>s+=d);process.stdin.on("end",()=>{const p=JSON.parse(s);const optional=p.optionalDependencies||{};for(const [name,version] of Object.entries(optional)){if(typeof version==="string"&&version.startsWith("workspace:")){throw new Error(`optionalDependencies.${name} uses workspace protocol (${version}) in packed manifest`);}}for(const name of ["@garden-co/jazz-napi-linux-x64-gnu","@garden-co/jazz-napi-win32-x64-msvc","@garden-co/jazz-napi-darwin-x64","@garden-co/jazz-napi-darwin-arm64"]){if(!optional[name]){throw new Error(`missing optional dependency ${name} in packed manifest`);}}console.log(`Packed manifest OK for ${p.name}@${p.version}`);});'

      - name: Verify packed jazz-tools manifest
        run: |
          TMP_DIR=$(mktemp -d)
          pnpm --filter jazz-tools pack --pack-destination "${TMP_DIR}"
          TARBALL=$(ls "${TMP_DIR}"/jazz-tools-*.tgz | head -n 1)
          tar -xOf "${TARBALL}" package/package.json | node -e 'let s="";process.stdin.on("data",(d)=>s+=d);process.stdin.on("end",()=>{const p=JSON.parse(s);for(const field of ["dependencies","optionalDependencies","peerDependencies"]){for(const [name,version] of Object.entries(p[field]||{})){if(typeof version==="string"&&version.startsWith("workspace:")){throw new Error(`${field}.${name} uses workspace protocol (${version}) in packed manifest`);}}}console.log(`Packed manifest OK for ${p.name}@${p.version}`);});'

      - name: Verify packed jazz-rn manifest
        run: |
          TMP_DIR=$(mktemp -d)
          npm_config_ignore_scripts=true pnpm --filter jazz-rn pack --pack-destination "${TMP_DIR}"
          TARBALL=$(ls "${TMP_DIR}"/jazz-rn-*.tgz | head -n 1)
          LISTING=$(mktemp)
          tar -tf "${TARBALL}" > "${LISTING}"

          # Ensure iOS payload is present for CocoaPods (Expo/RN iOS consumers).
          grep -q '^package/JazzRnFramework.xcframework/' "${LISTING}" || {
            echo "Missing JazzRnFramework.xcframework in packed jazz-rn tarball."
            exit 1
          }
          grep -q '^package/JazzRnFramework.xcframework/Info.plist$' "${LISTING}" || {
            echo "Missing JazzRnFramework.xcframework/Info.plist in packed jazz-rn tarball."
            exit 1
          }

          # Ensure key Android native slices are present for Expo/RN Android consumers.
          for abi in arm64-v8a x86_64; do
            grep -q "^package/android/src/main/jniLibs/${abi}/libjazz_rn\\.a$" "${LISTING}" || {
              echo "Missing Android native library for ABI ${abi} in packed jazz-rn tarball."
              exit 1
            }
          done

          tar -xOf "${TARBALL}" package/package.json | node -e 'let s="";process.stdin.on("data",(d)=>s+=d);process.stdin.on("end",()=>{const p=JSON.parse(s);for(const field of ["dependencies","optionalDependencies","peerDependencies"]){for(const [name,version] of Object.entries(p[field]||{})){if(typeof version==="string"&&version.startsWith("workspace:")){throw new Error(`${field}.${name} uses workspace protocol (${version}) in packed manifest`);}}}if(!(p.publishConfig&&p.publishConfig.tag==="alpha")){throw new Error(`Expected publishConfig.tag=alpha for ${p.name}, got ${(p.publishConfig||{}).tag}`);}console.log(`Packed manifest OK for ${p.name}@${p.version}`);});'

      - name: Publish jazz-wasm (alpha tag)
        if: env.RELEASE_MODE == 'publish'
        run: |
          WASM_VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("crates/jazz-wasm/package.json","utf8")).version')
          if npm view "jazz-wasm@${WASM_VERSION}" version >/dev/null 2>&1; then
            echo "jazz-wasm@${WASM_VERSION} already exists on npm; skipping publish."
          else
            pnpm --filter jazz-wasm publish --tag alpha --access public --no-git-checks
          fi

      - name: Publish jazz-napi (alpha tag)
        if: env.RELEASE_MODE == 'publish'
        run: |
          NAPI_VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("crates/jazz-napi/package.json","utf8")).version')
          for pkg_dir in crates/jazz-napi/npm/*; do
            pkg_name=$(node -p "JSON.parse(require('fs').readFileSync('${pkg_dir}/package.json','utf8')).name")
            if npm view "${pkg_name}@${NAPI_VERSION}" version >/dev/null 2>&1; then
              echo "${pkg_name}@${NAPI_VERSION} already exists on npm; skipping publish."
            else
              npm publish "${pkg_dir}" --tag alpha --access public
            fi
          done

          if npm view "jazz-napi@${NAPI_VERSION}" version >/dev/null 2>&1; then
            echo "jazz-napi@${NAPI_VERSION} already exists on npm; skipping publish."
          else
            pnpm --filter jazz-napi publish --tag alpha --access public --no-git-checks
          fi

      - name: Publish jazz-rn (alpha tag)
        if: env.RELEASE_MODE == 'publish'
        run: |
          RN_VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("crates/jazz-rn/package.json","utf8")).version')
          if npm view "jazz-rn@${RN_VERSION}" version >/dev/null 2>&1; then
            echo "jazz-rn@${RN_VERSION} already exists on npm; skipping publish."
          else
            npm_config_ignore_scripts=true pnpm --filter jazz-rn publish --tag alpha --access public --no-git-checks
          fi

      - name: Publish jazz-tools (alpha tag)
        if: env.RELEASE_MODE == 'publish'
        run: |
          TOOLS_VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("packages/jazz-tools/package.json","utf8")).version')
          if npm view "jazz-tools@${TOOLS_VERSION}" version >/dev/null 2>&1; then
            echo "jazz-tools@${TOOLS_VERSION} already exists on npm; skipping publish."
          else
            pnpm --filter jazz-tools publish --tag alpha --access public --no-git-checks
          fi
