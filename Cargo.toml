[workspace]
members = [
    "groove",
    "groove-wasm",
]
# Only build groove by default (groove-wasm is WASM-only)
default-members = ["groove"]
resolver = "2"

# Dev profile with debug symbols for better WASM stack traces
[profile.dev]
debug = true
opt-level = 0

[profile.release]
opt-level = "s"
lto = true


