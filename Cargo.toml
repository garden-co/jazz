[workspace]
resolver = "2"
members = [
  "crates/jazz-cloud-server",
  "crates/jazz-tools",
  "crates/jazz-wasm",
  "crates/jazz-napi",
  "crates/jazz-rn/rust",
  "crates/jazz-swift/rust",
  "crates/wasm-tracing",
  "examples/todo-server-rs",
  "examples/docs/todo-server-rs",
  "crates/opfs-btree",
]
[patch.crates-io]
rocksdb = { git = "https://github.com/garden-co/rust-rocksdb.git", branch = "feat/tdb-flush" }

[patch."https://github.com/garden-co/rust-rocksdb.git"]
librocksdb-sys = { path = "vendor/librocksdb-sys" }
