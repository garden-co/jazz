[workspace]
resolver = "2"
members = [
  "crates/jazz-cloud-server",
  "crates/jazz-tools",
  "crates/jazz-wasm",
  "crates/jazz-napi",
  "crates/jazz-rn/rust",
  "crates/wasm-tracing",
  "examples/todo-server-rs",
  "examples/docs/todo-server-rs",
  "crates/opfs-btree",
]

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
all = "deny"

[patch.crates-io]
fjall = { git = "https://github.com/garden-co/fjall.git", branch = "fjall-android-support" }
