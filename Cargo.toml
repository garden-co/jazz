[workspace]
resolver = "2"
members = [
  "crates/jazz-tools",
  "crates/jazz-wasm",
  "crates/jazz-napi",
  # React Native is paused while we decide whether the new core runtime should
  # use RocksDB on mobile or a dedicated mobile storage backend.
  # "crates/jazz-rn/rust",
  "crates/wasm-tracing",
  "examples/todo-server-rs",
  "examples/docs/todo-server-rs",
  "dev/benchmarks/storage/bench-core",
]
exclude = [
  "vendor/jazz_core/groove",
  "vendor/jazz_core/jazz",
  "vendor/jazz_core/jazz-wasm",
  "vendor/jazz_core/opfs-btree",
]

[workspace.dependencies]
groove = { path = "vendor/jazz_core/groove", default-features = false }
jazz = { path = "vendor/jazz_core/jazz", default-features = false }
jazz-server = { path = "vendor/jazz_core/jazz-server", default-features = false }

[patch.crates-io]
rust-rocksdb = { git = "https://github.com/zaidoon1/rust-rocksdb.git", tag = "v0.48.0" }
