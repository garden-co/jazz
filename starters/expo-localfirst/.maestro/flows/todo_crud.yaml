appId: dev.jazz.starter.expolocalfirst
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Your todos"
    timeout: 20000

- tapOn: "New todo"
- inputText: "Buy milk"
- hideKeyboard
- tapOn: "Add todo"

- assertNotVisible: "No todos yet."
- assertVisible: "Buy milk"

- tapOn: "New todo"
- inputText: "Pay rent"
- hideKeyboard
- tapOn: "Add todo"

- assertVisible: "Pay rent"
- assertVisible: "Buy milk"

- tapOn:
    text: "Delete"
    index: 0

- assertNotVisible: "Buy milk"
- assertVisible: "Pay rent"
