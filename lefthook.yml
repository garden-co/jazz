pre-commit:
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --fix --allow-dirty --allow-staged -- -D warnings
      stage_fixed: true
    oxfmt:
      glob: "*.{ts,tsx,js,jsx}"
      run: oxfmt .
      stage_fixed: true
    oxlint:
      glob: "*.{ts,tsx,js,jsx}"
      run: oxlint --fix .
      stage_fixed: true
