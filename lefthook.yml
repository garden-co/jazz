pre-commit:
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --manifest-path crates/groove/Cargo.toml -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --manifest-path crates/groove/Cargo.toml -- -D warnings
    oxfmt:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm format:check
    oxlint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm lint
