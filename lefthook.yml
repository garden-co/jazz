# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    # Formatting (runs first, in parallel)
    rust-format:
      glob: "*.rs"
      run: cargo fmt --all --manifest-path crates/Cargo.toml && git add {staged_files}
      stage_fixed: true
      priority: 1
    biome-format:
      glob: "*.{js,ts,tsx,jsx,json}"
      run: pnpm biome format --write {staged_files} && git add {staged_files}
      priority: 1

    # Linting (runs after formatting)
    rust-lint:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features --manifest-path crates/Cargo.toml -- -D warnings
      priority: 2
    biome-lint:
      glob: "*.{js,ts,tsx,jsx}"
      run: pnpm biome check {staged_files}
      priority: 2
