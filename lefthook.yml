pre-commit:
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace -- -D warnings
    oxfmt:
      glob: "*.{ts,tsx,js,jsx,md,mdx,json,html}"
      run: pnpm format {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*.{ts,tsx,js,jsx}"
      exclude: "crates/jazz-rn/src/**, examples/*/schema/app.ts, examples/docs/*/schema/app.ts, crates/jazz-napi/index.d.ts, crates/jazz-napi/index.js"
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true
